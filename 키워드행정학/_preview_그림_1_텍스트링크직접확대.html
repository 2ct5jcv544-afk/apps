<div class="variant-title">변형 1 — 텍스트 링크 → 바로 확대</div>
<div class="variant-sub">지문 속 &lt;그림&gt; 링크 텍스트를 탭하면 중간 단계 없이 바로 라이트박스로 확대된 그림이 뜸.</div>
<div class="section-label" style="font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin:6px 20px 8px;">상세페이지 — 045 지대추구이론 (일부)</div>
<div class="panel">
  <div class="meta-line">045 · 지대추구이론</div>
  <div class="detail-text">
    ② 톨록(Tullock)은 독점의 비용은 사중적 손실 이외에 독점권을 확보하기 위한 노력의 경비(P<sub>M</sub>BEP<sub>O</sub>)까지 포함해야 한다는 입장이다.
  </div>
  <span class="figref" data-action="openbox" id="figref1">&lt;그림: Tullock의 사각형&gt;</span>
  <div class="detail-text">
    ③ 크루거(Krueger, 1974)는 톨록이 제시한 이런 종류의 활동을 지대추구행위라고 명명하였다.
  </div>
</div>
