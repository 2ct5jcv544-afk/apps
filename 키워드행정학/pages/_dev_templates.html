<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키워드 행정학 — 개발용 템플릿 목록</title>
<style>
  :root {
    --bg:#000; --card:#1c1c1e; --card2:#2c2c2e; --text:#eee; --sub:#8a8a8a;
    --gold:#e0b84a; --silver:#e4e4ea; --border:#3a3a3a;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,"Apple SD Gothic Neo",sans-serif; max-width:480px; margin:0 auto; padding-bottom:40px; }
  a { text-decoration:none; color:inherit; }
  header { padding:22px 20px 10px; }
  header h1 { font-size:18px; margin:0 0 4px; }
  header p { font-size:12px; color:var(--sub); margin:0; line-height:1.6; }
  .group-title { font-size:12px; color:var(--sub); text-transform:uppercase; letter-spacing:.05em; margin:22px 20px 8px; }
  .tpl-card { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:0 20px 8px; background:var(--card); border-radius:14px; padding:14px 16px; }
  .tpl-card .name { font-size:14px; font-weight:600; }
  .tpl-card .desc { font-size:11px; color:var(--sub); margin-top:2px; }
  .tpl-card .arrow { font-size:16px; color:var(--sub); flex-shrink:0; }
  .badge { display:inline-block; font-size:10px; padding:2px 8px; border-radius:10px; margin-left:6px; vertical-align:1px; }
  .badge.wip { background:#3a3226; color:#d9a441; }
  .badge.live { background:#1e3a26; color:#5fbf7a; }
</style>
</head>
<body>
<header>
  <h1>🔧 개발용 템플릿 목록</h1>
  <p>실사용자용 화면 아님 — 모바일 테스트/비교용. 새 프리뷰 파일이 추가되면 이 목록도
  같이 갱신됨(TEMPLATES 배열, README §23 참고).</p>
</header>
<div id="list"></div>

<script>
const TEMPLATES_RAW = [
  ["홈 화면", "홈 (확정)", "../index.html", "ㅜ분할형, 이중 진행바, Lite 모드(제목 탭) 확정본", "live"],
  ["인터랙션 메커니즘 데모 (콘텐츠 아님, 번호 000 예약)", "상세페이지 데모", "_detail_000.html", "폰트/마진/간격 D안(31~32절) — 사이클 2종이 이 스타일을 그대로 공유. Lite 모드 지원(topicinfo 탭). 실제 학습 콘텐츠 아니고 메커니즘 확인용(2026-07-21, 075/002 실 예시는 삭제)", "live"],
  ["인터랙션 메커니즘 데모 (콘텐츠 아님, 번호 000 예약)", "목차 사이클 데모", "_cycle_목차_000.html", "헤딩(목차) 줄만 노출, 구조 드릴 전용. 작성/Lite 모두 버튼 없이 자동 진행 — 완료되면 상세페이지가 헤딩만 접힌 채로 뜨고(탭하면 해당 내용 펼침), 시간경과 없이 수동 '다음 ›' 버튼(중립색)으로 다음. ?chain=1로 들어오면 '다음'이 같은 번호의 키워드 사이클로 체이닝(42절)", "live"],
  ["인터랙션 메커니즘 데모 (콘텐츠 아님, 번호 000 예약)", "키워드 사이클 데모", "_cycle_키워드_000.html", "전체 내용 노출, 밑줄만 빈칸. 완료되면 1.5초 뒤 상세페이지 전체 노출→6초(누르고 있으면 정지) 뒤 자동 다음. 42절: 타이머 옆에 수동 탈출 '다음 ›' 버튼도 같이 노출", "live"],
  ["홈 연결 탭", "쟁점목록", "_list_쟁점목록.html", "검색+정렬(진도순/최신순/중요도순), 쟁점_레지스트리.js(TOPICS_REGISTRY) 연동 완료(41절) — #075 3자리 표기 + 번호 검색 지원. 최신순/중요도순은 실데이터(conf) 없어서 아직 진도순과 동일 동작 — TODO: conf 연동", "live"],
  ["홈 연결 탭", "오답노트", "_list_오답노트.html", "쟁점별/최신순/중요도순 3탭 뼈대. 채점 결과는 이제 저장되지만(40절 FSRS/conf 엔진) 오답노트 화면 자체의 실데이터 연동은 아직 — TODO: conf<0 필터링 연결", "live"]
];
const TEMPLATES = TEMPLATES_RAW.map(function(row){
  return { group: row[0], name: row[1], file: row[2], desc: row[3], status: row[4] };
});

function render(){
  var wrap = document.getElementById("list");
  wrap.innerHTML = "";
  var lastGroup = null;
  for (var i = 0; i < TEMPLATES.length; i++) {
    var t = TEMPLATES[i];
    if (t.group !== lastGroup) {
      var g = document.createElement("div");
      g.className = "group-title";
      g.textContent = t.group;
      wrap.appendChild(g);
      lastGroup = t.group;
    }
    var a = document.createElement("a");
    a.className = "tpl-card";
    a.href = t.file;
    var badgeHtml = t.status === "live"
      ? "<span class=\"badge live\">사용중</span>"
      : "<span class=\"badge wip\">검토중</span>";
    a.innerHTML = "<div><div class=\"name\">" + t.name + badgeHtml + "</div><div class=\"desc\">" + t.desc + "</div></div><span class=\"arrow\">›</span>";
    wrap.appendChild(a);
  }
}
render();
</script>
</body>
</html>
