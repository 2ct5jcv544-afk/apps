<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키워드 행정학 — 홈 A(ㅜ분할)</title>
<style>
  :root {
    --gold:#e0b84a; --silver:#e4e4ea; /* 목차(실버)/키워드(골드) 축 색상 — 작성/토글 모드와 무관, 고정 */
  }
  [data-mode="written"] {
    --bg:#000; --card:#1c1c1e; --card2:#2c2c2e; --text:#eee; --sub:#8a8a8a; --border:#3a3a3a;
    --liteAccent:#3ea6e0;
  }
  [data-mode="toggle"] {
    --bg:#ffffff; --card:#eef6fb; --card2:#e4f0f8; --text:#1c1c1e; --sub:#6b7680; --border:#cfe3f2;
    --liteAccent:#2f8fc9;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { background:var(--bg); }
  body { margin:0; color:var(--text); font-family:-apple-system,"Apple SD Gothic Neo",sans-serif; max-width:480px; margin:0 auto; transition:background .25s, color .25s; }
  a { text-decoration:none; color:inherit; }

  header { padding:22px 20px 14px; display:flex; justify-content:space-between; align-items:flex-start; }
  header h1 { font-size:22px; margin:0; cursor:pointer; user-select:none; }
  header h1 .lite-word { display:none; font-style:italic; font-weight:800; color:var(--liteAccent); margin-left:3px; }
  [data-mode="toggle"] header h1 .lite-word { display:inline; }
  header .gear { font-size:20px; opacity:.7; }

  .progresswrap { padding:14px 20px 22px; }
  .dualbar { display:flex; flex-direction:column; gap:6px; padding-top:14px; }
  .bar-row { position:relative; display:flex; align-items:center; gap:6px; }
  .bar-label { font-size:11px; color:var(--sub); width:36px; white-space:nowrap; flex-shrink:0; }
  .progressbar-wrap { position:relative; flex:1; }
  .scorebadge { position:absolute; top:-14px; left:0; transform:translateX(-50%); display:flex; align-items:center; gap:2px; font-size:11px; font-weight:600; white-space:nowrap; transition:left .3s, color .3s; }
  .scorebadge .bolt { width:11px; height:11px; }
  .progressbar { position:relative; height:4px; border-radius:2px; overflow:hidden; }
  .progressbar .cover { position:absolute; top:0; right:0; height:100%; background:var(--card2); transition:width .3s; }
  .milestone { position:absolute; top:0; bottom:0; width:2px; background:rgba(242,242,240,.85); }
  [data-mode="toggle"] .milestone { background:rgba(28,28,30,.35); }

  main { padding:0 20px 24px; }

  .toprow { display:flex; gap:8px; margin-bottom:22px; height:112px; }
  .tshape { flex:1.7; background:var(--card); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
  .tshape .top { flex:1; display:flex; align-items:center; justify-content:center; text-align:center; font-size:17px; font-weight:700; }
  .tshape .bot { flex:1; display:flex; border-top:1px solid var(--bg); }
  .tshape .bot a { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; background:var(--card2); font-size:11px; }
  .tshape .bot a:first-child { border-right:1px solid var(--border); }
  .tshape .bot svg { width:20px; height:20px; }

  .slot { flex:1; background:var(--card); border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; padding:8px 3px; font-size:10.5px; border:none; color:var(--text); text-align:center; }
  .slot .emoji { font-size:18px; }

  .section-title { font-size:12px; color:var(--sub); text-transform:uppercase; letter-spacing:.05em; margin:4px 0 10px; }
  .chapter-card { background:var(--card); border-radius:14px; padding:14px 16px; margin-bottom:10px; }
  .chapter-card .name { font-size:15px; font-weight:600; margin-bottom:4px; }
  .chapter-card .meta { font-size:12px; color:var(--sub); margin-bottom:10px; }
  .ch-bar-row { position:relative; display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .ch-bar-row:first-child { margin-top:12px; }
  .ch-bar-row:last-child { margin-bottom:0; }
  .ch-bar-label { font-size:10px; color:var(--sub); width:32px; white-space:nowrap; flex-shrink:0; }
  .ch-bar-wrap { position:relative; flex:1; }
  .ch-scorebadge { position:absolute; top:-12px; left:0; transform:translateX(-50%); display:flex; align-items:center; gap:2px; font-size:9px; font-weight:600; white-space:nowrap; }
  .ch-scorebadge .bolt-sm { width:9px; height:9px; }
  .ch-bar-wrap .bar { position:relative; height:3px; background:var(--card2); border-radius:2px; overflow:hidden; }
  .ch-bar-wrap .bar .cover { position:absolute; top:0; right:0; height:100%; background:var(--card2); }
  .ch-milestone { position:absolute; top:0; bottom:0; width:2px; background:rgba(242,242,240,.85); }
  [data-mode="toggle"] .ch-milestone { background:rgba(28,28,30,.35); }
</style>
</head>

<script src="쟁점_레지스트리.js"></script>
<script>
/* ============================================================
   챕터 구성 — 이동호 키워드 행정학 실제 CHAPTER 구조 그대로.
   출처: pdf 분석 모듈/samples/이동호_키워드행정학/목차_페이지매핑.md

   2026-07-18 확정(대화로그 참고): 작성식(written)/토글식(toggle) 두 트랙은
   완전히 분리 저장된다. 이 화면의 제목("키워드 행정학"/"키워드 행정학Lite")을
   탭하면 모드가 전환되고, 이중 바·챕터 카드 점수 전부 해당 트랙 데이터로
   다시 그려진다. 두 트랙 점수가 다르게 나오는 게 정상 — 그 괴리 자체가
   "토글로는 아는 줄 알았는데 작성은 안 됨" 같은 과신(過信) 신호로 쓰인다.
   지금은 written/toggle 각각 데모값(demoOutline/demoKeyword 관행 계승, TEST
   ONLY)만 넣어둠 — 실사용 로그 연동되면 각 트랙별 conf 집계로 교체할 것(TODO).
   ============================================================ */
/* 44절(2026-07-21): 하드코딩 데모 점수 대신 실제 쟁점_레지스트리+kwadmin_scores로
   계산(아래 chapterScorePct/mainScorePct). min/max는 이동호 키워드 행정학 실제
   챕터별 쟁점번호 범위(pdf 분석 모듈 목차매핑 근거) — 클릭 시 그 범위의 등록된
   쟁점만 모아 큐 체이닝을 시작하는 데도 같이 쓰임. */
const CHAPTERS = [
  { name:"총론",       total:67, min:1,   max:67  },
  { name:"정책론",     total:16, min:68,  max:83  },
  { name:"조직론",     total:37, min:84,  max:120 },
  { name:"인사행정론", total:40, min:121, max:160 },
  { name:"재무행정론", total:37, min:161, max:197 },
  { name:"행정환류",   total:15, min:198, max:212 },
  { name:"정보체계론", total:35, min:213, max:247 },
  { name:"지방행정론", total:22, min:248, max:269 }
];

/* ---------- 실제 점수 계산 ----------
   저장은 build.js sharedJs의 kwadmin_scores와 동일 키 구조({번호}-{outline|keyword}-
   {written|toggle}). 시간 경과에 따른 conf 감쇠(판례연습의 confDisplayOf/retrievability
   적용)는 홈 화면에서는 단순화상 적용하지 않고 저장된 conf 원값을 그대로 씀 — 추후
   보강 대상으로 남겨둠. 미학습(attempts=0) 또는 해당 범위에 등록된 쟁점이 아예 없으면
   conf=0(중립, 50%)으로 처리해 "모른다(0%)"가 아니라 "아직 안 봤다(중립)"를 표현한다. */
function loadScores(){
  try { return JSON.parse(localStorage.getItem('kwadmin_scores')) || {}; } catch(e){ return {}; }
}
function scoreOf(topicNum, track, mode){
  const scores = loadScores();
  const it = scores[topicNum + '-' + track + '-' + mode];
  return (it && it.attempts) ? it.conf : 0;
}
function pctFromConf(conf){ return Math.round((conf + 1) / 2 * 100); }
function topicsInRange(min, max){
  return realTopics().filter(t => { const n = Number(t.number); return n >= min && n <= max; });
}
function chapterScorePct(ch, track, mode){
  const topics = topicsInRange(ch.min, ch.max);
  if (!topics.length) return 50;
  let sum = 0;
  topics.forEach(t => { sum += scoreOf(t.number, track, mode); });
  return pctFromConf(sum / topics.length);
}
function mainScorePct(track, mode){
  const topics = realTopics();
  if (!topics.length) return 50;
  let sum = 0;
  topics.forEach(t => { sum += scoreOf(t.number, track, mode); });
  return pctFromConf(sum / topics.length);
}

const ROCK = "#3a3a3a";
const SILVER_BRIGHT = "#e4e4ea";
const GOLD_BRIGHT = "#f0dfa0";

function hexToRgb(hex){
  hex = hex.replace('#', '');
  return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
}
function lerpColor(from, to, t){
  const a = hexToRgb(from), b = hexToRgb(to);
  const r = Math.round(a[0] + (b[0]-a[0]) * t);
  const g = Math.round(a[1] + (b[1]-a[1]) * t);
  const bl = Math.round(a[2] + (b[2]-a[2]) * t);
  return `rgb(${r},${g},${bl})`;
}
/* barColor: 0~100 사이 특정 지점의 "차콜→목표색" 보간값 하나만 필요할 때(배지 색 등) */
function barColor(target, pct){
  const t = Math.max(0, Math.min(100, pct)) / 100;
  return lerpColor(ROCK, target, t);
}

function chBarRow(label, target, pct){
  const badgeColor = barColor(target, pct);
  return `
    <div class="ch-bar-row">
      <span class="ch-bar-label">${label}</span>
      <div class="ch-bar-wrap">
        <div class="ch-scorebadge" style="left:${pct}%;color:${badgeColor}">
          <svg class="bolt-sm" viewBox="0 0 24 24"><use href="#boltIcon"/></svg><span>${pct}</span>
        </div>
        <div class="bar" style="background:linear-gradient(to right, ${ROCK}, ${target})">
          <div class="cover" style="width:${100-pct}%"></div>
          <div class="ch-milestone" style="left:90%"></div>
        </div>
      </div>
    </div>
  `;
}

function renderChapters(){
  const wrap = document.getElementById("chapterList");
  wrap.innerHTML = "";
  CHAPTERS.forEach(ch => {
    const outlinePct = chapterScorePct(ch, "outline", MODE);
    const keywordPct = chapterScorePct(ch, "keyword", MODE);
    const div = document.createElement("div");
    div.className = "chapter-card";
    div.style.cursor = "pointer";
    div.innerHTML = `
      <div class="name">${ch.name}</div>
      <div class="meta">${ch.total}개 쟁점</div>
      ${chBarRow("목차", SILVER_BRIGHT, outlinePct)}
      ${chBarRow("키워드", GOLD_BRIGHT, keywordPct)}
    `;
    div.addEventListener("click", () => startChapterCycle(ch));
    wrap.appendChild(div);
  });
}

/* setBar: 트랙 배경 자체를 "차콜(0)→목표색(100)" 그라데이션으로 고정해두고,
   현재 점수(pct) 초과분만 회색 cover로 덮어 가린다 — 즉 점수 이하 구간만
   그라데이션이 드러나 보이고, 초과 구간은 지금까지처럼 회색 트랙으로 남는다. */
function setBar(trackId, coverId, badgeId, badgeNumId, target, pct){
  const track = document.getElementById(trackId);
  const cover = document.getElementById(coverId);
  const badge = document.getElementById(badgeId);
  const badgeNum = document.getElementById(badgeNumId);
  track.style.background = `linear-gradient(to right, ${ROCK}, ${target})`;
  cover.style.width = (100 - pct) + "%";
  badge.style.left = pct + "%";
  badge.style.color = barColor(target, pct);
  badgeNum.textContent = pct;
}

function applyDualScore(outlinePct, keywordPct){
  setBar("outlineTrack", "outlineCover", "outlineBadge", "outlineBadgeNum", SILVER_BRIGHT, outlinePct);
  setBar("keywordTrack", "keywordCover", "keywordBadge", "keywordBadgeNum", GOLD_BRIGHT, keywordPct);
}

/* ---------- 작성(written)/토글(toggle) 모드 전환 ----------
   제목("키워드 행정학"/"키워드 행정학Lite")을 탭하면 전환. body[data-mode]가
   바뀌면 CSS 변수(테마: 다크↔하늘색 라이트)가 자동으로 같이 바뀐다.
   localStorage에 마지막 모드를 저장해 새로고침해도 유지되게 함. */
let MODE = (localStorage.getItem('kwadmin_mode') === 'toggle') ? 'toggle' : 'written';

function renderAll(){
  document.body.dataset.mode = MODE;
  applyDualScore(mainScorePct("outline", MODE), mainScorePct("keyword", MODE));
  renderChapters();
}
function toggleMode(){
  MODE = (MODE === 'written') ? 'toggle' : 'written';
  localStorage.setItem('kwadmin_mode', MODE);
  renderAll();
}
renderAll();

/* ---------- 42절(2026-07-21): 시작 라우터 + 목차/키워드 바로가기 ----------
   "000"은 인터랙션 메커니즘 데모 예약 번호라 실제 쟁점에서 제외. 아직 실제
   쟁점이 하나도 등록되지 않았으면(콘텐츠 작업 전) 친절한 안내만 띄운다.
   추후 실제 스케줄링(pickWeight 등)이 붙기 전까지는 등록된 쟁점 중 번호가
   가장 낮은 것을 "현재 쟁점"으로 임시 사용한다. */
function realTopics(){
  return (typeof TOPICS_REGISTRY !== "undefined" ? TOPICS_REGISTRY : []).filter(t => t.number !== "000");
}
function currentTopic(){
  const list = realTopics();
  if (!list.length) return null;
  return list.slice().sort((a,b) => a.number.localeCompare(b.number))[0];
}
document.getElementById("startBtn").addEventListener("click", function(e){
  e.preventDefault();
  const t = currentTopic();
  if (!t) { alert("아직 등록된 쟁점이 없어요 — 콘텐츠 작업 후 이용할 수 있어요."); return; }
  location.href = t.outlineFile + "?chain=1";
});
document.getElementById("outlineIconBtn").addEventListener("click", function(e){
  e.preventDefault();
  const t = currentTopic();
  if (!t) { alert("아직 등록된 쟁점이 없어요 — 콘텐츠 작업 후 이용할 수 있어요."); return; }
  location.href = t.outlineFile;
});
document.getElementById("keywordIconBtn").addEventListener("click", function(e){
  e.preventDefault();
  const t = currentTopic();
  if (!t) { alert("아직 등록된 쟁점이 없어요 — 콘텐츠 작업 후 이용할 수 있어요."); return; }
  location.href = t.keywordFile;
});

/* ---------- 44절: 챕터 카드 탭 → 그 챕터 범위 쟁점만 큐로 묶어 체이닝 시작 ----------
   번호 오름차순으로 정렬해 첫 쟁점을 ?chain=1로 시작하고, 나머지는 &queue=...로
   넘겨서 목차→키워드가 한 쟁점씩 끝날 때마다 큐의 다음 쟁점으로 자동 연결되게 함
   (build.js의 outline/keyword nextTopic 큐 처리, 43~44절 참고). */
function startChapterCycle(ch){
  const topics = topicsInRange(ch.min, ch.max).slice().sort((a,b) => a.number.localeCompare(b.number));
  if (!topics.length) { alert(ch.name + " 챕터엔 아직 등록된 쟁점이 없어요."); return; }
  const first = topics[0];
  const rest = topics.slice(1).map(t => t.number);
  const q = rest.length ? "&queue=" + encodeURIComponent(rest.join(",")) : "";
  location.href = first.outlineFile + "?chain=1" + q;
}
