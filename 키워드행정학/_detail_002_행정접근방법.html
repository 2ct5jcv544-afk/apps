<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상세페이지 — 행정에 대한 접근방법</title>
<style>

  :root {
    --bg:#000; --card:#1c1c1e; --card2:#2c2c2e; --text:#eee;
    --sub:#8a8a8a; --border:#3a3a3a;
    --blankDefault:#f2f2f0; --dim:#6b6b6d;
    --outlineCorrect:#f2f2f0; --outlineWrong:#ef5350;
    --keywordCorrect:#4caf50; --keywordWrong:#5b9bd5;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,"Apple SD Gothic Neo",sans-serif; max-width:480px; margin:0 auto; padding-bottom:40px; }
  .screen { display:none; padding:16px; }
  .screen.active { display:block; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:6px 0 18px; }
  .topbar .chev { font-size:22px; color:#5b9bd5; }
  .topbar .topicinfo { font-size:14px; color:var(--sub); }
  .topbar .flag { font-size:18px; opacity:.8; }
  .chip { display:inline-block; background:#3a3226; color:#d9a441; font-size:14px; padding:6px 14px; border-radius:20px; margin-bottom:16px; }
  .card { background:var(--card); border-radius:16px; padding:20px; }
  .check-btn { width:100%; margin-top:16px; padding:14px; border:none; border-radius:14px; background:var(--card2); color:var(--text); font-size:15px; cursor:pointer; }
  .check-btn:active { background:#3a3a3c; }
  /* 레벨별 폰트 (답안지 참조: I > 1 > (1) 순 들여쓰기+비중 감소) */
  .lvl0 { font-size:16px; font-weight:700; }
  .lvl1 { font-size:14.5px; font-weight:600; }
  .lvl2 { font-size:13.5px; font-weight:600; }
  .lvlcontent { font-size:14.5px; font-weight:400; }
  /* 본문 단락 — 답안지 스타일: 양쪽정렬 + 단어 중간 안 잘림 */
  .paragraph { text-align:justify; line-height:1.9; word-break:keep-all; overflow-wrap:normal; }

  .detail-heading { margin:14px 0 4px; }
  .detail-heading:first-child { margin-top:0; }
  .detail-heading[data-indent="1"] { margin-left:18px; }
  .detail-heading[data-indent="2"] { margin-left:36px; }
  .detail-line { margin:4px 0; color:var(--dim); }
  .detail-line[data-indent="1"] { margin-left:16px; }
  .outline-blank { font-weight:700; text-decoration:underline; text-underline-offset:2px; color:var(--blankDefault); }
  .keyword-blank { font-weight:700; text-decoration:underline; text-underline-offset:2px; color:var(--blankDefault); }
</style>
</head>
<body>
<div class="topbar"><span class="chev">‹</span><span class="topicinfo">상세페이지</span><span></span></div>
<div class="chip">행정에 대한 접근방법</div>
<div class="card" id="detailCard"></div>

<script>
const OUTLINE = [{"lvl":"I","answer":"개념","indent":0},{"lvl":"1","answer":"일반적 개념","indent":1},{"lvl":"2","answer":"정부가 사회의 공공가치를 실현하기 위한 활동","indent":1},{"lvl":"II","answer":"행정에 대한 접근방법 (Rosenbloom, Wright)","indent":0},{"lvl":"1","answer":"정치적 관점","indent":1},{"lvl":"2","answer":"관리적(경영적) 관점","indent":1},{"lvl":"3","answer":"법적 관점","indent":1},{"lvl":"(1)","answer":"의의","indent":2},{"lvl":"(2)","answer":"법적 관점과 관리적 관점의 충돌과 해소방안","indent":2}];
const KEYWORD_LINES = [{"type":"heading","indent":0,"text":"I. 개념"},{"type":"heading","indent":1,"text":"1. 일반적 개념"},{"type":"heading","indent":1,"text":"2. 정부가 사회의 공공가치를 실현하기 위한 활동"},{"type":"heading","indent":0,"text":"II. 행정에 대한 접근방법 (Rosenbloom, Wright)"},{"type":"heading","indent":1,"text":"1. 정치적 관점(political perspective)"},{"type":"content","indent":1,"text":"① 정치는 '{{b}}'으로 정의됨({{b}})","blanks":["사회를 위한 가치의 권위적 배분","D. Easton"]},{"type":"content","indent":1,"text":"② 정치행정{{b}}론 패러다임에 입각","blanks":["일원"]},{"type":"content","indent":1,"text":"③ 행정은 {{b}} 실현을 주요 목적으로 하며 {{b}}을 가장 중요한 가치로 고려한다.","blanks":["공공가치","민주성"]},{"type":"content","indent":1,"text":"④ 행정은 다양한 {{b}}의 요구사항을 {{b}}하고자 한다.","blanks":["이해관계자들","조정·중재"]},{"type":"content","indent":1,"text":"⑤ 행정은 시민들의 {{b}}를 기반으로 한다({{b}} 실현, {{b}}을 달성).","blanks":["참여","참여적 민주주의","집합적 자기결정"]},{"type":"heading","indent":1,"text":"2. 관리적(경영적) 관점(managerial perspective)"},{"type":"content","indent":1,"text":"① 행정은 국가의 인적·물적·제도적 {{b}}라는 경영적 측면 강조","blanks":["자원 관리"]},{"type":"content","indent":1,"text":"② 정치행정{{b}}론 패러다임","blanks":["이원"]},{"type":"content","indent":1,"text":"③ {{b}}을 포함한 행정관리학자들은 행정을 정치와 분리된 {{b}}으로 간주하며, 행정의 {{b}}을 강조함.","blanks":["윌슨","독자적인 영역","관리기능"]},{"type":"content","indent":1,"text":"④ 보다 과학적이고 합리적인 정책결정 및 집행을 위한 다양한 {{b}} 사용(예: {{b}})","blanks":["관리기법","예비타당성조사 시 비용-편익분석, AHP 기법 활용"]},{"type":"heading","indent":1,"text":"3. 법적 관점"},{"type":"heading","indent":2,"text":"(1) 의의"},{"type":"heading","indent":2,"text":"(2) 법적 관점과 관리적 관점의 충돌과 해소방안"}];

/* 상세페이지: 헤딩(목차 볼드 부분)은 밑줄+볼드 강조, 본문 중 키워드(밑줄) 부분도
   동일 스타일로 강조, 나머지 비-빈칸 텍스트는 전부 dim 처리(2026-07-17, 사용자 지시 3). */
function render(){
  const card = document.getElementById("detailCard");
  card.innerHTML = KEYWORD_LINES.map(row => {
    if (row.type === "heading") {
      const lvlCls = row.indent === 0 ? "lvl0" : row.indent === 2 ? "lvl2" : "lvl1";
      const match = OUTLINE.find(o => row.text.includes(o.answer));
      let html = row.text;
      if (match) html = row.text.replace(match.answer, `<span class="outline-blank">${match.answer}</span>`);
      return `<div class="detail-heading ${lvlCls}" data-indent="${row.indent}">${html}</div>`;
    }
    const text = row.text.replace(/\{\{b\}\}/g, () => {
      const ans = row.blanks.shift();
      return `<span class="keyword-blank">${ans}</span>`;
    });
    return `<div class="detail-line lvlcontent paragraph" data-indent="${row.indent}">${text}</div>`;
  }).join("");
}
render();
</script>
</body>
</html>
