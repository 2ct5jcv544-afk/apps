<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목차 사이클</title>
<style>

  :root {
    --bg:#000; --card:#1c1c1e; --card2:#2c2c2e; --text:#eee;
    --sub:#8a8a8a; --border:#3a3a3a;
    --blankDefault:#f2f2f0; --dim:#6b6b6d;
    --outlineCorrect:#f2f2f0; --outlineWrong:#ef5350;
    --keywordCorrect:#4caf50; --keywordWrong:#5b9bd5;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",sans-serif; max-width:480px; margin:0 auto; padding-bottom:40px; }
  .screen { display:none; padding:16px; }
  .screen.active { display:block; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:6px 0 18px; }
  .topbar .chev { font-size:22px; color:#5b9bd5; }
  .topbar .topicinfo { font-size:14px; color:var(--sub); }
  .topbar .flag { font-size:18px; opacity:.8; }
  .chip { display:inline-block; background:#3a3226; color:#d9a441; font-size:14px; padding:6px 14px; border-radius:20px; margin-bottom:16px; }
  .card { background:var(--card); border-radius:16px; padding:20px; }
  .check-btn { width:100%; margin-top:16px; padding:14px; border:none; border-radius:14px; background:var(--card2); color:var(--text); font-size:15px; cursor:pointer; }
  .check-btn:active { background:#3a3a3c; }
  /* 폰트 — 목차(볼드 있음)/목차 외 딱 2종(2026-07-17 재설계, 5단계 대신 단순화) */
  .outline-font { font-size:16px; font-weight:700; }
  .body-font { font-size:14px; font-weight:400; }
  /* 본문 단락 — 답안지 스타일: 양쪽정렬 + 단어 중간 안 잘림 */
  .paragraph { text-align:left; line-height:1.9; word-break:keep-all; overflow-wrap:normal; }
  /* 마커+본문 hanging indent — flex로 분리해 본문이 여러 줄로 넘어가도 마커를 침범하지
     않고 항상 본문 시작 위치에 맞춰짐 */
  .line { display:flex; align-items:flex-start; margin:8px 0; }
  .line .marker { flex-shrink:0; margin-right:.45em; color:var(--sub); }
  .line .body { flex:1; }
  .line[data-indent="1"] { margin-left:18px; }
  .line[data-indent="2"] { margin-left:36px; }
  .line[data-indent="3"] { margin-left:54px; }
  .line[data-indent="4"] { margin-left:72px; }

  .outline-row { margin:9px 0; display:flex; align-items:baseline; gap:8px; }
  .outline-row .lvl { color:var(--sub); min-width:2.4em; flex-shrink:0; }
  .outline-row[data-indent="1"] { margin-left:18px; }
  .outline-row[data-indent="2"] { margin-left:36px; }
  .outline-row[data-indent="3"] { margin-left:54px; }
  .outline-row[data-indent="4"] { margin-left:72px; }
  .outline-row input {
    flex:1; background:transparent; border:none; border-bottom:1px solid var(--border);
    color:var(--text); font-size:14px; padding:4px 2px; outline:none;
  }
  .outline-row input.correct { border-bottom-color:var(--outlineCorrect); color:var(--outlineCorrect); }
  .outline-row input.wrong { border-bottom-color:var(--outlineWrong); color:var(--outlineWrong); }
  .outline-row .filled.correct { color:var(--outlineCorrect); }
  .outline-row .filled.wrong { color:var(--outlineWrong); }
</style>
</head>
<body>

<div class="screen active" id="screenQuestion">
  <div class="topbar"><span class="chev">‹</span><span class="topicinfo">목차 — 문제</span><span class="flag">🚩</span></div>
  <div class="card" id="outlineCard"></div>
  <button class="check-btn" onclick="submitOutline()">채점</button>
</div>

<div class="screen" id="screenAnswer">
  <div class="topbar"><span class="chev">‹</span><span class="topicinfo">목차 — 채점</span><span class="flag">🚩</span></div>
  <div class="chip">정책집행의 접근방법</div>
  <div class="card" id="reviewCard"></div>
  <button class="check-btn" onclick="nextTopic()">다음 쟁점</button>
</div>

<script>
const OUTLINE = [{"lvl":"I","answer":"정책집행의 의의","indent":0},{"lvl":"1","answer":"개념","indent":1},{"lvl":"III","answer":"정책집행의 접근 방법","indent":0},{"lvl":"1","answer":"하향식 접근방법","indent":1},{"lvl":"(1)","answer":"의의","indent":2},{"lvl":"(2)","answer":"성공적인 집행을 위한 조건","indent":2},{"lvl":"(3)","answer":"평가","indent":2},{"lvl":"①","answer":"장점","indent":3},{"lvl":"②","answer":"한계점","indent":3}];

function normalize(s){ return (s||"").replace(/\s+/g,"").trim(); }
let lastAnswers = [];

function markerFor(indent, lvl){ return indent <= 1 ? lvl + "." : lvl; }

function renderQuestion(){
  const card = document.getElementById("outlineCard");
  card.innerHTML = "";
  OUTLINE.forEach((row, idx) => {
    const div = document.createElement("div");
    div.className = "outline-row";
    div.dataset.indent = row.indent;
    div.innerHTML = `<span class="lvl outline-font">${markerFor(row.indent, row.lvl)}</span><input data-idx="${idx}">`;
    card.appendChild(div);
  });
}

function submitOutline(){
  let total = OUTLINE.length, correct = 0;
  lastAnswers = [];
  OUTLINE.forEach((row, idx) => {
    const input = document.querySelector(`#outlineCard input[data-idx="${idx}"]`);
    const val = input.value;
    const ok = normalize(val) === normalize(row.answer);
    lastAnswers.push({ val, ok });
    if (ok) correct++;
  });
  showAnswerScreen();
}

function showAnswerScreen(){
  const card = document.getElementById("reviewCard");
  card.innerHTML = "";
  OUTLINE.forEach((row, idx) => {
    const a = lastAnswers[idx];
    const div = document.createElement("div");
    div.className = "outline-row";
    div.dataset.indent = row.indent;
    const cls = a.ok ? "correct" : "wrong";
    div.innerHTML = `<span class="lvl outline-font">${markerFor(row.indent, row.lvl)}</span><span class="filled outline-font ${cls}">${row.answer}</span>`;
    card.appendChild(div);
  });
  document.getElementById("screenQuestion").classList.remove("active");
  document.getElementById("screenAnswer").classList.add("active");
}

function nextTopic(){
  renderQuestion();
  document.getElementById("screenAnswer").classList.remove("active");
  document.getElementById("screenQuestion").classList.add("active");
}

renderQuestion();
</script>
</body>
</html>
