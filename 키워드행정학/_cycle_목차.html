<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목차 사이클 — 모듈 템플릿</title>
<style>
  :root {
    --bg:#000; --card:#1c1c1e; --card2:#2c2c2e; --text:#eee; --sub:#8a8a8a;
    --green:#4caf50; --red:#ef5350; --chip:#3a3226; --chipText:#d9a441; --border:#3a3a3a;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,"Apple SD Gothic Neo",sans-serif; max-width:480px; margin:0 auto; }
  .screen { display:none; padding:16px; }
  .screen.active { display:block; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:6px 0 18px; }
  .topbar .chev { font-size:22px; color:#5b9bd5; }
  .topbar .topicinfo { font-size:14px; color:var(--sub); }
  .topbar .topicinfo .weight { color:#e0b84a; }
  .topbar .flag { font-size:18px; opacity:.8; }

  .progresswrap { padding:8px 0 14px; }
  .progressbar { height:4px; background:#333; border-radius:2px; overflow:hidden; }
  .progressfill { height:100%; background:var(--green); width:0%; transition:width .3s; }
  .iconbar { display:flex; justify-content:flex-end; gap:16px; margin-top:14px; font-size:18px; opacity:.8; }

  .chip { display:inline-block; background:var(--chip); color:var(--chipText); font-size:14px; padding:6px 14px; border-radius:20px; margin-bottom:16px; }

  .card { background:var(--card); border-radius:16px; padding:20px; line-height:2.1; font-size:15px; }

  .outline-row { margin:6px 0; display:flex; align-items:baseline; gap:8px; }
  .outline-row .lvl { color:var(--sub); font-size:13px; min-width:2.4em; }
  .outline-row input {
    flex:1; background:transparent; border:none; border-bottom:1px solid var(--border);
    color:var(--text); font-size:14px; padding:4px 2px; outline:none;
  }
  .outline-row input.correct { border-bottom-color:var(--green); color:var(--green); }
  .outline-row input.wrong { border-bottom-color:var(--red); color:var(--red); }
  .outline-row[data-indent="1"] { margin-left:18px; }
  .outline-row[data-indent="2"] { margin-left:36px; }

  .review-row { margin:8px 0; }
  .review-row .lvl { color:var(--sub); font-size:13px; }
  .review-row .ok { color:var(--green); }
  .review-row .miss { color:var(--red); text-decoration:line-through; }
  .review-row .fix { color:var(--green); margin-left:6px; }
  .review-row[data-indent="1"] { margin-left:18px; }
  .review-row[data-indent="2"] { margin-left:36px; }

  .refcard { background:var(--card); border-radius:12px; padding:14px 16px; margin-top:14px; font-size:13px; color:var(--sub); }

  .check-btn {
    width:100%; margin-top:16px; padding:14px; border:none; border-radius:14px;
    background:var(--card2); color:var(--text); font-size:15px; cursor:pointer;
  }
  .check-btn:active { background:#3a3a3c; }
</style>
</head>
<body>

<!-- 문제 화면 -->
<div class="screen active" id="screenQuestion">
  <div class="topbar">
    <span class="chev">‹</span>
    <span class="topicinfo" id="topicInfoQ"></span>
    <span class="flag">🚩</span>
  </div>
  <div class="card" id="outlineCard"></div>
  <button class="check-btn" onclick="submitOutline()">채점</button>
</div>

<!-- 정답 화면 -->
<div class="screen" id="screenAnswer">
  <div class="progresswrap">
    <div class="progressbar"><div class="progressfill" id="progressFill"></div></div>
    <div class="iconbar"><span>⏸</span><span>🚩</span></div>
  </div>
  <div class="chip" id="chipTopic"></div>
  <div class="card" id="reviewCard"></div>
  <div class="refcard" id="refCard" style="display:none"></div>
  <button class="check-btn" onclick="nextTopic()">다음 쟁점</button>
</div>

<script>
/* ============================================================
   TOPIC 데이터 — 실제 배치 시 이 블록을 라우터가 주입(랜덤 쟁점 선택).
   지금은 Topic 001 하드코딩 데모. weight/ref는 아직 확정 안 된 값이라
   자리만 잡아둠(TODO).
   ============================================================ */
const TOPIC = { id:"001", name:"행정의 의의", weight:null, ref:null };

const OUTLINE = [
  { lvl:"I",   answer:"개념", indent:0 },
  { lvl:"1",   answer:"일반적 개념", indent:1 },
  { lvl:"2",   answer:"정부가 사회의 공공가치를 실현하기 위한 활동", indent:1 },
  { lvl:"II",  answer:"행정에 대한 접근방법 (Rosenbloom, Wright)", indent:0 },
  { lvl:"1",   answer:"정치적 관점", indent:1 },
  { lvl:"2",   answer:"관리적(경영적) 관점", indent:1 },
  { lvl:"3",   answer:"법적 관점", indent:1 },
  { lvl:"(1)", answer:"의의", indent:2 },
  { lvl:"(2)", answer:"법적 관점과 관리적 관점의 충돌과 해소방안", indent:2 }
];

/* ============================================================
   로그 — 2원화/3원화 통계 결정을 나중으로 미루기 위해 태그를 넉넉히 남김.
   entryMode는 이 파일 단독으로는 항상 "individual". 시작(라우터)에서
   호출될 때는 라우터가 "시작"으로 override 하는 걸 TODO로 남김.
   ============================================================ */
function logAttempt(contentType, accuracy){
  const KEY = "kwadmin_attempts";
  const log = JSON.parse(localStorage.getItem(KEY) || "[]");
  log.push({
    topicId: TOPIC.id, contentType, entryMode: "individual",
    accuracy, ts: new Date().toISOString()
  });
  localStorage.setItem(KEY, JSON.stringify(log));
}

function normalize(s){ return (s||"").replace(/\s+/g,"").trim(); }

let lastAnswers = [];

function renderQuestion(){
  document.getElementById("topicInfoQ").innerHTML =
    TOPIC.name + (TOPIC.weight!=null ? ` · <span class="weight">⚡ ${TOPIC.weight}</span>` : "");
  const card = document.getElementById("outlineCard");
  card.innerHTML = "";
  OUTLINE.forEach((row, idx) => {
    const div = document.createElement("div");
    div.className = "outline-row";
    div.dataset.indent = row.indent;
    div.innerHTML = `<span class="lvl">${row.lvl}.</span><input data-idx="${idx}">`;
    card.appendChild(div);
  });
}

function submitOutline(){
  let total = OUTLINE.length, correct = 0;
  lastAnswers = [];
  OUTLINE.forEach((row, idx) => {
    const input = document.querySelector(`#outlineCard input[data-idx="${idx}"]`);
    const val = input.value;
    const ok = normalize(val) === normalize(row.answer);
    lastAnswers.push({ val, ok });
    if (ok) correct++;
  });
  const accuracy = total ? correct/total : 0;
  logAttempt("목차", accuracy);
  showAnswerScreen(accuracy);
}

function showAnswerScreen(accuracy){
  document.getElementById("chipTopic").textContent = TOPIC.name;
  const card = document.getElementById("reviewCard");
  card.innerHTML = "";
  OUTLINE.forEach((row, idx) => {
    const a = lastAnswers[idx];
    const div = document.createElement("div");
    div.className = "review-row";
    div.dataset.indent = row.indent;
    if (a.ok) {
      div.innerHTML = `<span class="lvl">${row.lvl}.</span> <span class="ok">${row.answer}</span>`;
    } else {
      div.innerHTML = `<span class="lvl">${row.lvl}.</span> <span class="miss">${a.val || "(공백)"}</span><span class="fix">→ ${row.answer}</span>`;
    }
    card.appendChild(div);
  });

  const refCard = document.getElementById("refCard");
  if (TOPIC.ref) { refCard.style.display = "block"; refCard.textContent = "📖 " + TOPIC.ref; }
  else { refCard.style.display = "none"; }

  // 진행률 표시 — 단일 토픽 데모라 세션 카운트 기반 mock. 실제로는 라우터가 큐 진행률 계산.
  const sessionCount = parseInt(sessionStorage.getItem("kwadmin_outline_count") || "0") + 1;
  sessionStorage.setItem("kwadmin_outline_count", sessionCount);
  document.getElementById("progressFill").style.width = Math.min(100, sessionCount * 20) + "%";

  document.getElementById("screenQuestion").classList.remove("active");
  document.getElementById("screenAnswer").classList.add("active");
}

function nextTopic(){
  // TODO: 실제로는 라우터가 다음 랜덤 쟁점 데이터를 주입. 지금은 같은 토픽 재출제로 모의.
  renderQuestion();
  document.getElementById("screenAnswer").classList.remove("active");
  document.getElementById("screenQuestion").classList.add("active");
}

renderQuestion();
</script>
</body>
</html>
