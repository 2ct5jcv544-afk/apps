<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목차 사이클</title>
<style>

  :root {
    --outlineWrong:#ef5350; /* 오답=빨강, 테마 불문 고정 */
  }
  [data-mode="written"] {
    --bg:#000; --card:#1c1c1e; --card2:#2c2c2e; --text:#eee;
    --sub:#8a8a8a; --border:#3a3a3a;
    --blankDefault:#f2f2f0; --dim:#6b6b6d;
  }
  [data-mode="toggle"] {
    --bg:#ffffff; --card:#eef6fb; --card2:#e4f0f8; --text:#1c1c1e;
    --sub:#6b7680; --border:#cfe3f2;
    --blankDefault:#2f8fc9; --dim:#9a9a95;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { background:var(--bg); }
  body { margin:0; color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",sans-serif; max-width:480px; margin:0 auto; padding-bottom:40px; transition:background .2s,color .2s; }
  .screen { display:none; padding:16px; }
  .screen.active { display:block; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:6px 0 18px; }
  .topbar .chev { font-size:22px; color:#5b9bd5; }
  .topbar .topicinfo { font-size:14px; color:var(--sub); cursor:pointer; user-select:none; }
  .topbar .flag { font-size:18px; opacity:.8; }
  .chip { display:inline-block; background:#3a3226; color:#d9a441; font-size:14px; padding:6px 14px; border-radius:20px; margin-bottom:16px; }
  .card { background:var(--card); border-radius:16px; padding:20px; }
  .check-btn { width:100%; margin-top:16px; padding:14px; border:none; border-radius:14px; background:var(--card2); color:var(--text); font-size:15px; cursor:pointer; }
  .check-btn:active { background:var(--border); }
  .outline-font { font-size:16px; font-weight:700; }
  .body-font { font-size:14px; font-weight:400; }
  .paragraph { text-align:left; line-height:1.9; word-break:keep-all; overflow-wrap:normal; }
  .line { display:flex; align-items:flex-start; margin:2px 0; }
  .line .marker { flex-shrink:0; margin-right:.45em; color:var(--sub); }
  .line .body { flex:1; }
  .line .body.dim { color:var(--dim); }
  .line.outline-margin { margin-top:10px; }
  .line.outline-margin[data-indent="0"] { margin-top:20px; }
  .line.outline-margin:first-child { margin-top:0; }
  .line.outline-margin[data-indent="1"] { margin-left:18px; }
  .line.outline-margin[data-indent="2"] { margin-left:36px; }
  .line.outline-margin[data-indent="3"] { margin-left:54px; }
  .line.outline-margin[data-indent="4"] { margin-left:72px; }
  .line.content-margin[data-indent] { margin-left:16px; margin-right:16px; }
  .outline-blank { font-weight:700; color:var(--blankDefault); }
  .keyword-blank { color:var(--blankDefault); }
  .outline-blank.wrong, .keyword-blank.wrong { color:var(--outlineWrong); }
  .blank-input { font:inherit; background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--text); padding:1px 2px; outline:none; width:4.5em; }
  .blank-input:focus { border-bottom-color:var(--blankDefault); }
  .tg-hidden { display:inline-block; min-width:3em; text-align:center; border-bottom:1px dashed var(--border); color:var(--sub); cursor:pointer; }
  .tg-revealed { cursor:default; }
  .tg-ctrl { display:inline-flex; gap:5px; margin-left:6px; vertical-align:middle; }
  .tg-ok, .tg-no { display:inline-block; width:19px; height:19px; line-height:19px; text-align:center; border-radius:50%; font-size:11px; font-weight:700; cursor:pointer; background:var(--card2); }
  .tg-ok { color:#4caf50; }
  .tg-no { color:var(--outlineWrong); }

</style>
</head>
<body data-mode="written">

<div class="screen active" id="screenQuestion">
  <div class="topbar"><span class="chev">‹</span><span class="topicinfo" onclick="toggleMode()">목차 — 문제</span><span class="flag">🚩</span></div>
  <div class="chip">정책집행의 접근방법</div>
  <div class="card" id="qCard"></div>
  <button class="check-btn" id="mainBtn" onclick="mainBtnClick()">채점</button>
</div>

<div class="screen" id="screenAnswer">
  <div class="topbar"><span class="chev">‹</span><span class="topicinfo" onclick="toggleMode()">목차 — 채점</span><span class="flag">🚩</span></div>
  <div class="chip">정책집행의 접근방법</div>
  <div class="card" id="aCard"></div>
  <button class="check-btn" onclick="nextTopic()">다음 쟁점</button>
</div>

<script>

const KEYWORD_LINES = [{"indent":0,"marker":"I.","bold":"정책집행의 의의","body":"정책집행의 의의","blanks":[]},{"indent":1,"marker":"1.","bold":"개념","body":"개념","blanks":[]},{"indent":1,"marker":"","bold":null,"body":"정책집행(policy implementation)이란 정책결정 과정의 산출물인 정책을 {{b}}으로 실현해 가는 과정(process)이다.","blanks":["구체적이고 실천적인 방법"]},{"indent":0,"marker":"III.","bold":"정책집행의 접근 방법","body":"정책집행의 접근 방법","blanks":[]},{"indent":1,"marker":"1.","bold":"하향식 접근방법","body":"하향식 접근방법(top-down approach)","blanks":[]},{"indent":2,"marker":"(1)","bold":"의의","body":"의의: 정치·행정 이원론적 시각","blanks":[]},{"indent":3,"marker":"①","bold":null,"body":"정책집행을 정책결정단계에서 채택된 {{b}}를 달성하는 과정으로 보면서, 바람직한 집행이 이루어질 수 있는 {{b}}을 정책결정자에게 제시하는데 주로 관심.","blanks":["정책목표","규범적 처방"]},{"indent":3,"marker":"②","bold":null,"body":"정책이 결과물을 창출하는 과정에서 {{b}}가 어떤 역할을 하였는지에 관심. 상위 조직에서 만들어진 조직이 하위 조직에서 프로그램 수준으로 구체화되는 과정을 정책집행 과정으로 간주.","blanks":["정책결정자"]},{"indent":3,"marker":"③","bold":null,"body":"{{b}}의 집행연구가 대표적.","blanks":["Van Meter & Van Horn"]},{"indent":2,"marker":"(2)","bold":"성공적인 집행을 위한 조건","body":"성공적인 집행을 위한 조건: Sabatier & Mazmanian","blanks":[]},{"indent":3,"marker":"①","bold":null,"body":"정책결정의 내용은 타당한 {{b}}(정책과 문제 해결 간)에 바탕을 둬야 한다.","blanks":["인과이론"]},{"indent":3,"marker":"②","bold":null,"body":"정책내용으로서 법령은 명확한 {{b}}을 가지고 있어야 하며, 대상집단의 순응을 극대화할 수 있도록 구성되어야 한다.","blanks":["정책지침"]},{"indent":3,"marker":"③","bold":null,"body":"유능하고 {{b}}가 정책집행을 담당하여야 한다.","blanks":["헌신적인 집행관료"]},{"indent":3,"marker":"④","bold":null,"body":"결정된 정책에 대해 조직화된 {{b}}, 그리고 주요 입법가 또는 행정부의 장으로부터 지속적인 지지를 받아야 한다.","blanks":["이익집단, 유권자 집단"]},{"indent":3,"marker":"⑤","bold":null,"body":"정책목표는 {{b}}이어서 집행과정 동안 목표의 우선순위가 변하지 않아야 한다.","blanks":["안정적"]},{"indent":2,"marker":"(3)","bold":"평가","body":"평가","blanks":[]},{"indent":3,"marker":"①","bold":"장점","body":"장점","blanks":[]},{"indent":4,"marker":"㉠","bold":null,"body":"{{b}} 등 중요한 성공적 집행 요인을 제시","blanks":["법적 구조화"]},{"indent":4,"marker":"㉡","bold":null,"body":"제시한 효과적인 집행의 조건들은 집행 과정에서 유용한 {{b}}으로 활용","blanks":["점검목록(checklist)"]},{"indent":4,"marker":"㉢","bold":null,"body":"소수의 영향변수에 관심을 집중시킴. 정책 담당자들로 하여금 기존 정책을 이해하고, 정책의 결정과 집행을 위한 {{b}} 수립을 가능","blanks":["법적·절차적 전략"]},{"indent":4,"marker":"㉣","bold":null,"body":"정책목표 달성도를 중시하므로 {{b}}가 가능","blanks":["객관적인 정책평가"]},{"indent":3,"marker":"②","bold":"한계점","body":"한계점","blanks":[]},{"indent":4,"marker":"㉠","bold":null,"body":"다원적 민주주의 체제하에서는 정책목표는 다양한 이해관계집단의 요구를 반영해야 되기 때문에 {{b}} 설정되는 경우가 많음.","blanks":["모호하게"]},{"indent":4,"marker":"㉡","bold":null,"body":"정책결정권자가 집행 과정에서 발생하는 모든 문제를 예견해 법령에 그 대안을 제시할 수 있다는 전제는 {{b}}","blanks":["비현실적"]},{"indent":4,"marker":"㉢","bold":null,"body":"정책집행 현장에서 중시되는 민간부문, 일선관료, 지방의 집행관료의 전략적 행위, 그리고 다른 정책의 하부 시스템과 관련된 변수들에 대한 {{b}}","blanks":["고려가 부족"]},{"indent":4,"marker":"㉣","bold":null,"body":"하나의 정책에 초점 → 여러 정책이 동시에 집행되는 경우를 설명하기 {{b}}","blanks":["곤란"]}];
function sizeCls(row){ return (row.bold && row.indent === 0) ? "outline-font" : "body-font"; }
function marginCls(row){ return row.bold ? "outline-margin" : "content-margin"; }

/* ---------- 토글식 상태 ---------- */
let TOGGLE_STATE = {};
function tgKey(track, idx){ return track + "-" + idx; }
function tgGet(track, idx){
  const k = tgKey(track, idx);
  if (!TOGGLE_STATE[k]) TOGGLE_STATE[k] = { revealed:false, solved:false, retries:0 };
  return TOGGLE_STATE[k];
}
function renderToggleSpan(track, idx, answer){
  const st = tgGet(track, idx);
  const baseCls = (track === "outline") ? "outline-blank" : "keyword-blank";
  if (st.solved) return `<span class="${baseCls}">${answer}</span>`;
  if (st.revealed) {
    const k = tgKey(track, idx);
    return `<span class="${baseCls} tg-revealed">${answer}<span class="tg-ctrl"><span class="tg-ok" data-tgact="ok" data-tgkey="${k}">✓</span><span class="tg-no" data-tgact="no" data-tgkey="${k}">✗</span></span></span>`;
  }
  return `<span class="tg-hidden" data-tgact="reveal" data-tgkey="${tgKey(track,idx)}">···</span>`;
}

function renderLines(mode, grades){
  let outlineIdx = 0, keywordIdx = 0;
  return KEYWORD_LINES.map(row => {
    if ((mode === "q-outline" || mode === "a-outline") && !row.bold) {
      return ""; /* 목차 모드: 헤딩(볼드) 없는 내용 줄은 생략 — 구조만 드릴 */
    }
    let body = row.body;
    if (row.bold) {
      const oi = outlineIdx++;
      if (mode === "q-outline") {
        body = (MODE === "toggle")
          ? body.replace(row.bold, renderToggleSpan("outline", oi, row.bold))
          : body.replace(row.bold, `<input class="blank-input" data-oidx="${oi}">`);
      } else if (mode === "a-outline") {
        const ok = grades.outline[oi].ok;
        body = body.replace(row.bold, `<span class="outline-blank${ok?"":" wrong"}">${row.bold}</span>`);
      } else {
        body = body.replace(row.bold, `<span class="outline-blank">${row.bold}</span>`);
      }
    }
    let localBlankIdx = 0;
    body = body.replace(/\{\{b\}\}/g, () => {
      const localI = localBlankIdx++;
      const ki = keywordIdx++;
      if (mode === "q-keyword") {
        return (MODE === "toggle")
          ? renderToggleSpan("keyword", ki, row.blanks[localI])
          : `<input class="blank-input" data-kidx="${ki}">`;
      } else if (mode === "a-keyword") {
        const g = grades.keyword[ki];
        return `<span class="keyword-blank${g.ok?"":" wrong"}">${g.ans}</span>`;
      }
      return `<span class="keyword-blank">${row.blanks[localI]}</span>`;
    });
    return `<div class="line ${sizeCls(row)} ${marginCls(row)} paragraph" data-indent="${row.indent}"><span class="marker">${row.marker}</span><span class="body dim">${body}</span></div>`;
  }).filter(h => h !== "").join("");
}

function normalize(s){ return (s||"").replace(/\s+/g,"").trim(); }

/* 작성(written)/토글(toggle) 모드 — 홈 화면과 동일한 localStorage 키 공유 */
let MODE = (localStorage.getItem('kwadmin_mode') === 'toggle') ? 'toggle' : 'written';
function applyMode(){ document.body.dataset.mode = MODE; }
function toggleMode(){
  MODE = (MODE === 'written') ? 'toggle' : 'written';
  localStorage.setItem('kwadmin_mode', MODE);
  applyMode();
  rerenderCurrent();
}
applyMode();

/* 토글 블랭크 클릭(공개/맞음/틀림) 위임 핸들러 — qCard가 있는 화면에서 공용 */
function bindToggleHandler(cardId){
  document.getElementById(cardId).addEventListener("click", function(e){
    const el = e.target.closest("[data-tgact]");
    if (!el) return;
    const act = el.dataset.tgact, key = el.dataset.tgkey;
    const st = TOGGLE_STATE[key];
    if (!st) return;
    if (act === "reveal") st.revealed = true;
    else if (act === "ok") st.solved = true;
    else if (act === "no") { st.revealed = false; st.retries++; }
    rerenderCurrent();
  });
}

const OUTLINE = [{"lvl":"I","answer":"정책집행의 의의","indent":0},{"lvl":"1","answer":"개념","indent":1},{"lvl":"III","answer":"정책집행의 접근 방법","indent":0},{"lvl":"1","answer":"하향식 접근방법","indent":1},{"lvl":"(1)","answer":"의의","indent":2},{"lvl":"(2)","answer":"성공적인 집행을 위한 조건","indent":2},{"lvl":"(3)","answer":"평가","indent":2},{"lvl":"①","answer":"장점","indent":3},{"lvl":"②","answer":"한계점","indent":3}];
let lastGrades = null;

function rerenderCurrent(){
  document.getElementById("qCard").innerHTML = renderLines("q-outline");
  document.getElementById("mainBtn").textContent = (MODE === "toggle") ? "다음 쟁점" : "채점";
}

function mainBtnClick(){
  if (MODE === "toggle") { nextTopic(); return; }
  submitOutline();
}

function submitOutline(){
  const outline = OUTLINE.map((row, oi) => {
    const input = document.querySelector(`[data-oidx="${oi}"]`);
    const val = input ? input.value : "";
    const ok = normalize(val) === normalize(row.answer);
    return { val, ok };
  });
  lastGrades = { outline, keyword: [] };
  document.getElementById("aCard").innerHTML = renderLines("a-outline", lastGrades);
  document.getElementById("screenQuestion").classList.remove("active");
  document.getElementById("screenAnswer").classList.add("active");
}

function nextTopic(){
  TOGGLE_STATE = {};
  rerenderCurrent();
  document.getElementById("screenAnswer").classList.remove("active");
  document.getElementById("screenQuestion").classList.add("active");
}

bindToggleHandler("qCard");
rerenderCurrent();
</script>
</body>
</html>
