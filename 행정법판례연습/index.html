<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>행정법 판례 연습</title>
<style>
  :root{
    --bg:#0b0b0c; --card:#18181a; --card2:#1f1f22; --text:#f2f2f0; --sub:#8b8b8a; --sub2:#6b6b6a;
    --accent:#5b8cff; --good:#5FD068; --bad:#E24B4A; --warn:#EF9F27; --warn2:#FAC775;
    --border:#2a2a2c; --border2:#35353a; --detailhi:#8fb3e0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    height:100%;}
  body{padding-bottom:env(safe-area-inset-bottom);}
  #app{max-width:640px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}
  header.topbar{position:sticky;top:0;z-index:20;background:rgba(11,11,12,.92);backdrop-filter:blur(8px);
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:10px;}
  header.topbar .back{font-size:22px;color:var(--accent);padding:2px 8px;cursor:pointer;user-select:none;}
  header.topbar h1{font-size:16px;margin:0;flex:1;font-weight:600;line-height:1.3;}
  header.topbar .hint{font-size:12px;color:var(--sub);}
  header.topbar .gear{font-size:19px;color:var(--sub);padding:2px 6px;cursor:pointer;}
  main{flex:1;padding:12px 14px 40px;position:relative;}

  .home-title{font-size:16px;font-weight:600;margin:6px 4px 10px;}
  .home-actions{display:flex;gap:8px;margin-bottom:14px;align-items:stretch;}
  .abtn{text-align:center;background:var(--card);border:1px solid var(--border);border-radius:12px;
    color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;white-space:nowrap;overflow:hidden;}
  .abtn.main{flex:1.6;padding:16px 6px;font-size:15px;font-weight:600;}
  .abtn.main .ic{font-size:22px;}
  .abtn.sub{flex:1;padding:9px 4px;font-size:11.5px;font-weight:500;}
  .abtn.sub .ic{font-size:15px;}

  .search-box{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--border);
    background:var(--card);color:var(--text);font-size:14px;margin-bottom:12px;}
  .search-box::placeholder{color:var(--sub2);}

  .topic-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;
    margin-bottom:10px;cursor:pointer;}
  .topic-card .row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .topic-card .ttl{font-size:14px;font-weight:500;}
  .topic-card .meta{font-size:11px;color:var(--sub);margin-top:3px;}
  .topic-card .date{font-size:11px;color:var(--sub2);flex-shrink:0;}
  .progress-bar{height:4px;border-radius:4px;background:var(--border);margin-top:8px;overflow:hidden;}
  .progress-bar > div{height:100%;background:var(--good);}
  .chev{color:var(--sub2);font-size:16px;}

  .tabrow{display:flex;gap:14px;margin:0 4px 10px;}
  .tabrow .t{font-size:12px;color:var(--sub2);cursor:pointer;padding-bottom:3px;}
  .tabrow .t.active{color:var(--text);font-weight:500;border-bottom:2px solid var(--good);}

  .pillrow{display:flex;gap:6px;margin:0 4px 10px;flex-wrap:wrap;}
  .pill{font-size:11px;padding:4px 9px;border-radius:20px;border:1px solid var(--border);color:var(--sub2);cursor:pointer;}
  .pill.active{background:var(--good);border-color:var(--good);color:#0b0b0c;font-weight:500;}

  .group-header{font-size:11px;color:var(--sub2);margin:12px 4px 4px;}
  .list-row{display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--border);gap:8px;cursor:pointer;}
  .list-row:last-child{border-bottom:none;}
  .list-row .left{display:flex;align-items:center;gap:8px;min-width:0;}
  .list-row .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .dot.gray{background:#5a5a5c;} .dot.green{background:var(--good);} .dot.red{background:var(--bad);}
  .dot.orange{background:var(--warn);} .dot.yellow{background:var(--warn2);}

  .gauge-wrap{position:relative;margin:4px 4px 16px;padding-top:24px;}
  .gauge-floatlabel{position:absolute;top:0;transform:translateX(-50%);font-size:12.5px;font-weight:600;white-space:nowrap;}
  .gauge-floatlabel .tick{position:absolute;left:50%;top:18px;width:1px;height:8px;background:currentColor;opacity:.6;transform:translateX(-50%);}
  .gauge-track{position:relative;height:8px;border-radius:5px;background:var(--border);overflow:hidden;}
  .gauge-track > div{height:100%;border-radius:5px;}
  .gauge-threshold{position:absolute;top:0;bottom:0;width:2px;background:rgba(242,242,240,.85);}
  .gauge-badge{margin-top:8px;display:inline-block;font-size:11.5px;padding:4px 10px;border-radius:20px;
    background:rgba(95,208,104,.18);color:var(--good);font-weight:500;}
  .list-row .txt{font-size:12.5px;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .list-row .date{font-size:11px;color:var(--sub2);flex-shrink:0;}
  .list-row .flagmark{font-size:11px;flex-shrink:0;opacity:.8;}

  .idxbar{position:fixed;right:6px;top:150px;bottom:16px;width:16px;display:flex;flex-direction:column;
    justify-content:space-between;align-items:center;z-index:15;touch-action:none;}
  .idxbar span{font-size:9px;color:var(--sub2);line-height:1;padding:1px 0;}
  .idxbubble{position:fixed;background:#3a3a3d;border-radius:12px;padding:8px 14px;white-space:nowrap;
    font-size:13px;font-weight:500;color:var(--text);z-index:60;display:none;pointer-events:none;}

  .qcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 16px;
    font-size:15px;line-height:1.6;min-height:120px;display:flex;align-items:center;margin-bottom:14px;}
  .quiz-meta{font-size:11px;color:var(--sub);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
  .quiz-meta .icons{display:flex;gap:14px;align-items:center;}
  .choices{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
  .choice-btn{padding:14px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);
    color:var(--text);font-size:14px;font-weight:500;cursor:pointer;text-align:center;}
  .choice-btn.unsure{color:var(--sub);}
  .choice-btn.correct{border-color:var(--good);background:rgba(95,208,104,.15);color:var(--good);}
  .choice-btn.wrong{border-color:var(--bad);background:rgba(226,75,74,.15);color:var(--bad);}
  .choice-btn.unsure-picked{border-color:var(--warn);background:rgba(239,159,39,.15);color:var(--warn);}
  .choice-btn.disabled{pointer-events:none;}

  .reveal-bar-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:14px;overflow:hidden;cursor:pointer;}
  .reveal-bar-fill{height:100%;background:var(--good);width:0%;}
  .reveal-bar-fill.paused{background:#666;}
  .detail-topactions{display:flex;justify-content:flex-end;gap:16px;align-items:center;margin-bottom:10px;}
  .detail-topactions .ic-btn{cursor:pointer;display:flex;align-items:center;opacity:.75;}
  .cat-badge{display:inline-block;background:var(--card2);color:var(--detailhi);font-size:12px;
    padding:3px 10px;border-radius:20px;margin-bottom:12px;}
  .cat-badge.correct{color:var(--good);} .cat-badge.wrong{color:var(--bad);} .cat-badge.unsure{color:var(--warn);}
  .result-tag{font-size:12px;color:var(--sub);margin-bottom:8px;}
  .detail-text{font-size:14.5px;line-height:1.75;margin-bottom:14px;}
  .detail-text .hi{color:var(--detailhi);}
  .wb-badge{background:var(--card2);border-radius:10px;padding:10px 12px;font-size:12.5px;color:#9db4d6;margin-top:6px;}

  .flag-sheet{position:fixed;left:0;right:0;bottom:0;max-width:640px;margin:0 auto;background:var(--card2);
    border:1px solid var(--border2);border-top-left-radius:16px;border-top-right-radius:16px;
    padding:16px 16px calc(16px + env(safe-area-inset-bottom));z-index:110;box-shadow:0 -4px 24px rgba(0,0,0,.4);}
  .flag-sheet .ttl{font-size:14px;font-weight:500;margin-bottom:12px;}
  .flag-sheet textarea{width:100%;min-height:80px;background:#222;border:1px solid var(--border2);border-radius:8px;
    padding:10px;color:var(--text);font-size:13px;font-family:inherit;resize:none;}
  .flag-sheet textarea.prefilled{color:var(--sub);}
  .flag-sheet .row{display:flex;gap:8px;margin-top:12px;}

  .setting-row{display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px solid var(--border);cursor:pointer;}
  .setting-row:last-child{border-bottom:none;}
  .setting-row .lbl{font-size:13.5px;}
  .setting-row.danger .lbl{color:var(--bad);}

  .empty{text-align:center;color:var(--sub);padding:60px 20px;font-size:14px;line-height:1.7;}
  .statute-box{background:var(--card2);border:1px dashed var(--border);border-radius:10px;padding:12px 14px;
    font-size:12px;color:var(--sub);line-height:1.7;margin-bottom:14px;white-space:pre-wrap;}
  mark{background:rgba(239,159,39,.35);color:inherit;border-radius:3px;padding:0 1px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;
    z-index:100;padding:24px;}
  .modal-box{background:var(--card2);border:1px solid var(--border2);border-radius:14px;padding:16px;max-width:300px;
    width:100%;}
  .modal-box .msg{font-size:13px;line-height:1.6;margin-bottom:6px;font-weight:500;}
  .modal-box .sub{font-size:11.5px;color:var(--sub);line-height:1.5;margin-bottom:14px;}
  .modal-box .row{display:flex;gap:8px;}
  .btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:12.5px;font-weight:500;cursor:pointer;}
  .btn.ghost{background:#2f2f31;color:var(--text);}
  .btn.primary{background:var(--accent);color:#fff;}
  .btn.danger{background:var(--bad);color:#4A1B0C;}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <span class="back" id="backBtn" style="visibility:hidden;">‹</span>
    <h1 id="topTitle">행정법 판례 연습</h1>
    <span class="gear" id="gearBtn" style="visibility:hidden;">⚙️</span>
  </header>
  <main id="main"></main>
  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal-box">
      <div class="msg" id="modalMsg"></div>
      <div class="sub" id="modalSub"></div>
      <div class="row">
        <button class="btn ghost" data-action="modalcancel">취소</button>
        <button class="btn danger" data-action="modalok" id="modalOkBtn">확인</button>
      </div>
    </div>
  </div>
  <div class="flag-sheet" id="flagSheet" style="display:none;">
    <div class="ttl">신고 내용 (선택)</div>
    <textarea id="flagNoteInput"></textarea>
    <div class="row">
      <button class="btn ghost" data-action="flagcancel">취소</button>
      <button class="btn primary" data-action="flagsubmit">신고</button>
    </div>
  </div>
  <div class="idxbubble" id="idxBubble"></div>
  <input type="file" id="importFile" accept="application/json" style="display:none;">
</div>
<!-- 클라우드 로그(선택 기능)용 SDK. FIREBASE_CONFIG가 설정되기 전까지는 아래 스크립트가 로드되어도

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

// ---------- FSRS 기반 D(난이도)/S(안정성)/R(회상확률) 엔진 ----------
// 근거·수식 출처: C:\Users\uos\Claude\Projects\프로그램\설계\중요도_수식_설계.md
const FSRS_W = [0.40255, 1.18385, 3.173, 15.69105, 7.1949, 0.5345, 1.4604, 0.0046, 1.54575,
  0.1192, 1.01925, 1.9395, 0.11, 0.29605, 2.2698, 0.2315, 2.9898, 0.51655, 0.6621];
const FSRS_F = 19/81, FSRS_C = -0.5;
const GRADE = {wrong:1, unsure:2, correct:3}; // Forgot / Hard / Good (Easy는 UI에 없어 미사용)
const TARGET_RETENTION = 0.9;

function retrievability(t, s){
  if(s==null || s<=0) return null;
  return Math.pow(1 + FSRS_F*(t/s), FSRS_C);
}
function fsrsInitStability(g){ return FSRS_W[g-1]; }
function fsrsInitDifficulty(g){
  const d = FSRS_W[4] - Math.exp(FSRS_W[5]*(g-1)) + 1;
  return Math.min(Math.max(d,1),10);
}
function fsrsNextStability(d, s, r, g){
  if(g===1){ // Forgot(오답): 상한 = 기존 S, 절대 못 올라감
    const d_f = Math.pow(d, -FSRS_W[12]);
    const s_f = Math.pow(s+1, FSRS_W[13]) - 1;
    const r_f = Math.exp(FSRS_W[14]*(1-r));
    return Math.min(d_f*s_f*r_f*FSRS_W[11], s);
  }
  const t_d = 11 - d;
  const t_s = Math.pow(s, -FSRS_W[9]);
  const t_r = Math.exp(FSRS_W[10]*(1-r)) - 1;
  const h = (g===2) ? FSRS_W[15] : 1.0; // Hard(모르겠음) 페널티
  const alpha = 1 + t_d*t_s*t_r*h*Math.exp(FSRS_W[8]);
  return s*alpha;
}
function fsrsNextDifficulty(d, g){
  const delta = -FSRS_W[6]*(g-3);
  const dp = d + delta*((10-d)/9);
  const easyAnchor = Math.min(Math.max(FSRS_W[4] - Math.exp(FSRS_W[5]*3) + 1, 1), 10); // D0(Easy) 앵커값
  return Math.min(Math.max(FSRS_W[7]*easyAnchor + (1-FSRS_W[7])*dp, 1), 10);
}
function updateItemDS(it, grade, t, rBefore){
  const hasPrev = (it.S!=null && it.D!=null && it.attempts>0);
  if(!hasPrev){
    it.S = fsrsInitStability(grade);
    it.D = fsrsInitDifficulty(grade);
  } else {
    const rUse = (rBefore==null) ? 1 : rBefore;
    it.S = Math.max(fsrsNextStability(it.D, it.S, rUse, grade), 0.5);
    it.D = fsrsNextDifficulty(it.D, grade);
  }
}
// ---------- conf 델타룰 (Rescorla-Wagner) ----------
// 답변 즉시 등급에 반응해 움직이는 신뢰도(conf, -1~+1). FSRS(D,S,R)는 여기 관여하지 않고
// conf>=0(초록)일 때 시간에 따른 감쇠속도만 결정한다. 근거·시행착오는 중요도_수식_설계.md 3절 참고.
const CONF_LAMBDA = {correct:1.0, unsure:-0.5, wrong:-1.0};
const CONF_ALPHA = 0.5;
function updateConf(confOld, result){
  const lambda = CONF_LAMBDA[result];
  return Math.max(-1, Math.min(1, confOld + CONF_ALPHA*(lambda-confOld)));
}
function confDisplayOf(it, today){
  if(!it || it.attempts===0) return 0; // 미접 = 중립(하양)
  const c = (it.conf==null) ? 0 : it.conf;
  if(c >= 0){
    const t = Math.max(daysBetween(it.lastSeenDate, today), 0);
    const r = retrievability(t, it.S);
    return c * (r==null ? 1 : r); // 초록만 S 속도로 하양을 향해 감쇠
  }
  return c; // 빨강은 시간과 무관, 재시험 전까지 고정
}
// red(-1) ↔ gray(0) ↔ green(+1) 연속 그라데이션
const CONF_COLOR_RED = [0xE2,0x4B,0x4A], CONF_COLOR_GRAY = [0x5a,0x5a,0x5c], CONF_COLOR_GREEN = [0x5F,0xD0,0x68];
function confColor(cd){
  cd = Math.max(-1, Math.min(1, cd||0));
  let c0, c1, t;
  if(cd <= 0){ c0=CONF_COLOR_RED; c1=CONF_COLOR_GRAY; t = cd+1; }
  else { c0=CONF_COLOR_GRAY; c1=CONF_COLOR_GREEN; t = cd; }
  const r = Math.round(c0[0]+(c1[0]-c0[0])*t);
  const g = Math.round(c0[1]+(c1[1]-c0[1])*t);
  const b = Math.round(c0[2]+(c1[2]-c0[2])*t);
  return 'rgb('+r+','+g+','+b+')';
}
function boltIcon(color){
  return '<svg width="12" height="12" viewBox="0 0 24 24" style="vertical-align:-1px;"><polygon points="13,2 3,14 11,14 9,22 21,10 13,10" fill="'+color+'"/></svg>';
}
function pickWeight(it, today){
  if(!it || it.attempts===0) return 999; // 미접 항목은 최우선 노출
  const cd = confDisplayOf(it, today);
  return Math.max((1-cd)/2, 0.02);
}
// ---------- 전체 지식귀속도 게이지 ----------
const GAUGE_THRESHOLD_PCT = 95; // 초기 임계값(raw avg_conf_display 0.90) — 근거는 설계문서 참고, 실사용 로그로 재조정 예정
function overallGauge(){
  const today = todayStr();
  let keys = [];
  DATA.filter(t=>t.type==='binary').forEach(t=>{ t.items.forEach((_,i)=>{ keys.push(keyOf(t.id,i)); }); });
  if(keys.length===0) return {pct:0, raw:0};
  let sum = 0;
  keys.forEach(k=>{ sum += confDisplayOf(getItem(k), today); });
  const raw = sum/keys.length; // -1~1, 미접 항목은 0(하양)으로 자연히 참여
  const pct = Math.round((raw+1)/2*100);
  return {pct, raw};
}
function topicGauge(t){
  const today = todayStr();
  if(!t.items.length) return {pct:0, raw:0};
  let sum = 0;
  t.items.forEach((_,i)=>{ sum += confDisplayOf(getItem(keyOf(t.id,i)), today); });
  const raw = sum/t.items.length;
  const pct = Math.round((raw+1)/2*100);
  return {pct, raw};
}

function recordAnswer(k, result){
  const it = ensureItem(k);
  const today = todayStr();
  const grade = GRADE[result];
  const hadPrev = (it.S!=null && it.attempts>0);
  const t = hadPrev ? Math.max(daysBetween(it.lastSeenDate, today), 0) : 0;
  const rBefore = hadPrev ? retrievability(t, it.S) : null;

  updateItemDS(it, grade, t, rBefore);

  const confBefore = (it.conf==null) ? 0 : it.conf;
  it.conf = updateConf(confBefore, result);

  it.attempts++;
  it.lastSeenDate = today;
  it.lastSeenTs = Date.now();
  const logEntry = {date:today, result:result,
    rBefore: rBefore==null ? null : Math.round(rBefore*1000)/1000,
    sAfter: Math.round(it.S*100)/100,
    dAfter: Math.round(it.D*100)/100,
    confBefore: Math.round(confBefore*1000)/1000,
    confAfter: Math.round(it.conf*1000)/1000};
  it.log.push(logEntry);
  logAnswerToCloud(k, result, {
    confBefore: logEntry.confBefore, confAfter: logEntry.confAfter,
    rBefore: logEntry.rBefore, sAfter: logEntry.sAfter, dAfter: logEntry.dAfter,
    topicId: String(k).split('#')[0]
  });
  if(result==='correct'){
    if(it.lastCorrectDate !== today){ it.dayStreak++; it.lastCorrectDate = today; }
    if(it.dayStreak>=3){ it.confidentWrong=0; it.unsure=0; }
  } else {
    it.dayStreak = 0;
    it.everWrong = true;
    if(result==='wrong') it.confidentWrong++;
    else it.unsure++;
  }
  persist();
}
function topicMastery(t){
  let masteredN=0, wrongN=0, lastDate=null;
  t.items.forEach((_,i)=>{
    const it = getItem(keyOf(t.id,i));
    if(it){
      if(isMastered(it)) masteredN++;
      else if(it.attempts>0) wrongN++;
      if(it.lastSeenDate && (!lastDate || it.lastSeenDate>lastDate)) lastDate = it.lastSeenDate;
    }
  });
  return {total:t.items.length, masteredN, wrongN, lastDate, pct: Math.round(masteredN/t.items.length*100)};
}

// ---------- QUIZ (집중학습) ----------
let QUIZ = null;
function buildQuizPool(id){
  let pool = [];
  if(id==='ALL'){
    DATA.filter(t=>t.type==='binary').forEach(t=>{
      t.items.forEach((it,i)=>{ if(!isFlagged(keyOf(t.id,i))) pool.push({topicId:t.id, idx:i, topic:t}); });
    });
  } else {
    const t = findTopic(id);
    t.items.forEach((it,i)=>{ if(!isFlagged(keyOf(t.id,i))) pool.push({topicId:t.id, idx:i, topic:t}); });
  }
  return pool;
}
const EPSILON = 0.2; // 20% 확률로 가중치 무시하고 전체 풀 균등 무작위 추첨 (엡실론 그리디, 근거는 설계문서 참고)
function pickWeighted(pool, avoidKey){
  const today = todayStr();
  const scored = pool.map(p=>({p, score: pickWeight(getItem(keyOf(p.topicId,p.idx)), today)}));
  const total = scored.reduce((s,x)=>s+x.score,0);
  function draw(){
    if(Math.random() < EPSILON){
      return pool[Math.floor(Math.random()*pool.length)];
    }
    let r = Math.random()*total;
    let pick = scored[scored.length-1].p;
    for(const x of scored){ r-=x.score; if(r<=0){ pick=x.p; break; } }
    return pick;
  }
  for(let tries=0; tries<5; tries++){
    const pick = draw();
    if(pool.length<=1 || keyOf(pick.topicId,pick.idx)!==avoidKey) return pick;
  }
  return scored[0].p;
}
function renderQuiz(id){
  const pool = buildQuizPool(id);
  QUIZ = { pool, id, lastKey:null, answered:false };
  topTitle.textContent = id==='ALL' ? '' : findTopic(id).title;
  if(pool.length===0){ mainEl.innerHTML = '<div class="empty">이 쟁점엔 판례결론 문항이 없습니다.</div>'; return; }
  drawQuizCard();
}
function drawQuizCard(){
  const q = QUIZ;
  const cur = pickWeighted(q.pool, q.lastKey);
  q.cur = cur;
  q.lastKey = keyOf(cur.topicId, cur.idx);
  const t = cur.topic;
  const it = t.items[cur.idx];
  q.answered = false;
  const todayQ = todayStr();
  const itemRaw = confDisplayOf(getItem(keyOf(cur.topicId, cur.idx)), todayQ);
  const itemPct = Math.round((itemRaw+1)/2*100);
  const pctLabel = boltIcon(confColor(itemRaw))+' '+itemPct;
  let html = '<div class="quiz-meta"><span>'+escapeHtml(t.title)+' · '+pctLabel+'</span>';
  html += '<span class="icons"><span class="ic-btn" data-action="flagopen" data-key="'+keyOf(cur.topicId,cur.idx)+'">🚩</span></span></div>';
  html += '<div class="qcard">'+escapeHtml(it.prompt)+'</div>';
  html += '<div class="choices" id="choices">';
  html += '<button class="choice-btn" data-action="choose" data-choice="0">'+escapeHtml(t.categories[0])+'</button>';
  html += '<button class="choice-btn" data-action="choose" data-choice="1">'+escapeHtml(t.categories[1])+'</button>';
  html += '<button class="choice-btn unsure" data-action="choose" data-choice="2">❓ 모르겠음</button>';
  html += '</div>';
  mainEl.innerHTML = html;
}
function chooseQuiz(choice){
  const q = QUIZ;
  if(q.answered) return;
  q.answered = true;
  const cur = q.cur;
  const t = cur.topic, it = t.items[cur.idx];
  const k = keyOf(t.id, cur.idx);
  const correct = (choice === it.cat);
  const result = correct?'correct':(choice===2?'unsure':'wrong');
  recordAnswer(k, result);
  renderRevealPanel({mode:'quiz', topicId:t.id, idx:cur.idx, result:result});
}

// ---------- shared reveal / detail panel ----------
let REVEAL = null;
function stopReveal(){
  if(REVEAL && REVEAL.raf) cancelAnimationFrame(REVEAL.raf);
  REVEAL = null;
}
function pauseReveal(){ if(REVEAL){ REVEAL.paused = true; updateRevealIcon(); } }
function toggleReveal(){
  if(!REVEAL) return;
  REVEAL.paused = !REVEAL.paused;
  REVEAL.lastTick = performance.now();
  updateRevealIcon();
  if(!REVEAL.paused) tickReveal();
}
function updateRevealIcon(){
  const bar = document.getElementById('revealBar');
  if(bar) bar.classList.toggle('paused', !!(REVEAL && REVEAL.paused));
}
function tickReveal(){
  if(!REVEAL || REVEAL.paused) return;
  const now = performance.now();
  const dt = now - REVEAL.lastTick;
  REVEAL.lastTick = now;
  REVEAL.remaining -= dt;
  const bar = document.getElementById('revealBar');
  const pct = Math.max(0, Math.min(100, (1 - REVEAL.remaining/5000)*100));
  if(bar) bar.style.width = pct+'%';
  if(REVEAL.remaining<=0){ skipReveal(); return; }
  REVEAL.raf = requestAnimationFrame(tickReveal);
}
function skipReveal(){
  stopReveal();
  if(QUIZ) drawQuizCard();
}
function renderRevealPanel(ctx){
  // ctx: {mode:'quiz'|'list', topicId, idx, result}
  const t = findTopic(ctx.topicId);
  const it = t.items[ctx.idx];
  const k = keyOf(t.id, ctx.idx);
  const catLabel = t.type==='binary' ? t.categories[it.cat] : '';
  let html = '';
  if(ctx.mode==='list'){
    const todayR = todayStr();
    const scoreRaw = confDisplayOf(getItem(k), todayR);
    const scorePct = Math.round((scoreRaw+1)/2*100);
    html += '<div class="quiz-meta"><span>'+escapeHtml(t.title)+' · '+boltIcon(confColor(scoreRaw))+' '+scorePct+'</span></div>';
  }
  if(ctx.mode==='quiz'){
    html += '<div class="reveal-bar-track" data-action="revealbar"><div class="reveal-bar-fill" id="revealBar"></div></div>';
  }
  html += '<div class="detail-topactions">';
  if(ctx.mode==='quiz'){
    html += '<span class="ic-btn" data-action="revealbar" title="일시정지/재생"><svg width="16" height="16" viewBox="0 0 16 16" id="pauseIcon"><rect x="3" y="2" width="3.2" height="12" rx="1" fill="#ccc"/><rect x="9.8" y="2" width="3.2" height="12" rx="1" fill="#ccc"/></svg></span>';
  }
  html += '<span class="ic-btn" data-action="flagopen" data-key="'+k+'">🚩</span>';
  html += '</div>';
  if(catLabel){
    const cls = ctx.result==='correct' ? 'correct' : (ctx.result==='unsure' ? 'unsure' : 'wrong');
    html += '<div class="cat-badge '+cls+'">'+escapeHtml(catLabel)+'</div>';
  }
  if(ctx.result){
    const tag = ctx.result==='correct' ? '✅ 정답' : (ctx.result==='unsure' ? '❓ 모르겠음' : '❌ 오답');
    html += '<div class="result-tag">'+tag+'</div>';
  }
  html += '<div class="detail-text" data-action="'+(ctx.mode==='quiz'?'revealskip':'')+'">'+escapeHtml(it.prompt)+
    (it.detail ? ' <span class="hi">'+escapeHtml(it.detail)+'</span>' : '')+'</div>';
  if(t.wbRef){
    html += '<div class="wb-badge">📖 워크북 '+escapeHtml(t.wbRef.no)+' · '+escapeHtml(t.wbRef.name)+' (p.'+t.wbRef.pStart+'~'+t.wbRef.pEnd+')</div>';
  }
  mainEl.innerHTML = html;
  if(ctx.mode==='quiz'){
    REVEAL = {remaining:5000, paused:false, raf:null, lastTick:performance.now(), mode:'quiz'};
    tickReveal();
  }
}
function renderDetail(route){
  topTitle.textContent = findTopic(route.topicId).title;
  renderRevealPanel({mode:'list', topicId:route.topicId, idx:route.idx, result:null});
}

// ---------- LIST (판례목록 / 오답 드릴다운 공용) ----------
function collectListItems(route){
  const topics = route.topicId ? [findTopic(route.topicId)] : DATA;
  const today = todayStr();
  let rows = [];
  topics.forEach(t=>{
    t.items.forEach((it,i)=>{
      const k = keyOf(t.id,i);
      const rec = getItem(k);
      if(route.filter==='flagged'){
        if(!(rec && rec.flagged)) return;
      } else {
        if(rec && rec.flagged) return; // 신고된 문항은 고쳐지기 전까지 판례목록/오답노트에 노출 안 함
        if(route.filter==='wrong' && !(rec && confDisplayOf(rec, today) < 0)) return;
      }
      rows.push({t, it, i, k, rec});
    });
  });
  return rows;
}
function renderList(route){
  const t = route.topicId ? findTopic(route.topicId) : null;
  topTitle.textContent = t ? t.title : '판례목록';
  let html = '';
  if(t && t.note){ html += '<div class="statute-box">'+escapeHtml(t.note)+'</div>'; }
  html += '<input class="search-box" id="listSearch" placeholder="사안 검색" value="'+escapeHtml(route.q||'')+'">';
  if(route.filter!=='wrong'){
    html += '<div class="pillrow">';
    html += '<span class="pill '+(route.sort==='order'?'active':'')+'" data-action="listsort" data-val="order">진도순</span>';
    html += '<span class="pill '+(route.sort==='recent'?'active':'')+'" data-action="listsort" data-val="recent">최신순</span>';
    html += '<span class="pill '+(route.sort==='weight'?'active':'')+'" data-action="listsort" data-val="weight">중요도순</span>';
    html += '</div>';
  }
  html += '<div id="listBody" style="padding-right:18px;"></div>';
  mainEl.innerHTML = html;
  document.getElementById('listSearch').addEventListener('input', (e)=>{ route.q = e.target.value; drawList(route); });
  drawList(route);
}
function matchSearch(r, q){
  if(!q) return true;
  const ql = q.toLowerCase();
  if(r.it.prompt.toLowerCase().includes(ql)) return true;
  if(r.it.detail && r.it.detail.toLowerCase().includes(ql)) return true;
  if(r.t.title.toLowerCase().includes(ql)) return true;
  return false;
}
function drawList(route){
  const body = document.getElementById('listBody');
  let rows = collectListItems(route);
  const q = (route.q||'').trim();
  if(q) rows = rows.filter(r=>matchSearch(r,q));
  let html='';
  const oldBar = document.querySelector('.idxbar');
  if(oldBar) oldBar.remove();
  if(rows.length===0){ body.innerHTML = '<div class="empty">해당하는 판례가 없습니다.</div>'; return; }
  if(route.sort==='order'){
    const today0 = todayStr();
    rows.sort((a,b)=> (TOPIC_ORDER[a.t.id]-TOPIC_ORDER[b.t.id]) || (confDisplayOf(a.rec,today0)-confDisplayOf(b.rec,today0)));
    let curTopic=null; const groups=[];
    rows.forEach(r=>{
      if(curTopic!==r.t.id){
        html += '<div class="group-header" data-group="'+escapeHtml(r.t.id)+'">'+TOPIC_ORDER[r.t.id]+' '+escapeHtml(r.t.title)+'</div>';
        groups.push({id:r.t.id, order:TOPIC_ORDER[r.t.id], title:r.t.title});
        curTopic=r.t.id;
      }
      html += rowHtml(r, q);
    });
    body.innerHTML = html;
    if(groups.length>1) buildIndexBar(groups);
  } else {
    if(route.sort==='recent'){
      rows.sort((a,b)=>{
        const ta = a.rec ? (a.rec.lastSeenTs||0) : 0;
        const tb = b.rec ? (b.rec.lastSeenTs||0) : 0;
        return tb-ta;
      });
    } else {
      const today = todayStr();
      rows.sort((a,b)=>{
        const sa = a.rec && a.rec.flagged ? -999 : confDisplayOf(a.rec, today);
        const sb = b.rec && b.rec.flagged ? -999 : confDisplayOf(b.rec, today);
        return sa-sb; // 오름차순: 가장 빨간(불안정한) 것부터
      });
    }
    rows.forEach(r=>{ html += rowHtml(r, q); });
    body.innerHTML = html;
  }
}
function rowHtml(r, q){
  const color = confColor(confDisplayOf(r.rec, todayStr()));
  const date = r.rec && r.rec.lastSeenDate ? fmtDate(r.rec.lastSeenDate) : '';
  const flag = r.rec && r.rec.flagged ? '<span class="flagmark">🚩</span>' : '';
  return '<div class="list-row" data-action="row" data-topic="'+escapeHtml(r.t.id)+'" data-idx="'+r.i+'"><div class="left"><span class="dot" style="background:'+color+'"></span><p class="txt">'+highlight(r.it.prompt,q)+'</p></div><div style="display:flex;align-items:center;gap:6px;">'+flag+'<span class="date">'+date+'</span></div></div>';
}
function buildIndexBar(groups){
  const bar = document.createElement('div');
  bar.className = 'idxbar';
  groups.forEach(g=>{
    const s = document.createElement('span');
    s.textContent = g.order;
    bar.appendChild(s);
  });
  mainEl.appendChild(bar);
  const bubble = document.getElementById('idxBubble');
  function handle(clientY, clientX){
    const rect = bar.getBoundingClientRect();
    let ratio = (clientY - rect.top) / rect.height;
    ratio = Math.max(0, Math.min(0.999, ratio));
    const idx = Math.floor(ratio * groups.length);
    const g = groups[idx];
    const hdr = document.querySelector('.group-header[data-group="'+g.id+'"]');
    if(hdr){ window.scrollTo({top: hdr.getBoundingClientRect().top + window.scrollY - 60}); }
    bubble.textContent = g.order+' · '+g.title;
    bubble.style.display = 'block';
    bubble.style.top = Math.max(60, clientY-20)+'px';
    bubble.style.right = '34px';
  }
  function end(){ bubble.style.display = 'none'; }
  bar.addEventListener('touchstart', e=>{ handle(e.touches[0].clientY, e.touches[0].clientX); e.preventDefault(); }, {passive:false});
  bar.addEventListener('touchmove', e=>{ handle(e.touches[0].clientY, e.touches[0].clientX); e.preventDefault(); }, {passive:false});
  bar.addEventListener('touchend', end);
  bar.addEventListener('mousedown', e=>{ handle(e.clientY, e.clientX);
    function mv(ev){ handle(ev.clientY, ev.clientX); }
    function up(){ end(); document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up);
  });
}

// ---------- WRONG NOTE (오답노트) ----------
// 최상위 3개 동급 탭: 쟁점별 / 최신순 / 중요도순 (쟁점별만 하위에 특정 쟁점 드릴다운 → 최신순·중요도순 서브정렬)
// 대상 항목: confDisplayOf(item) < 0 (신고되지 않은 항목) — everWrong 플래그 대신 실시간 conf 기준 사용
let WRONGTAB = 'group'; // 'group' | 'recent' | 'weight'
function renderWrong(){
  topTitle.textContent = '오답노트';
  let html = '<div class="tabrow">';
  html += '<span class="t '+(WRONGTAB==='group'?'active':'')+'" data-action="wrongtab" data-val="group">쟁점별</span>';
  html += '<span class="t '+(WRONGTAB==='recent'?'active':'')+'" data-action="wrongtab" data-val="recent">최신순</span>';
  html += '<span class="t '+(WRONGTAB==='weight'?'active':'')+'" data-action="wrongtab" data-val="weight">중요도순</span>';
  html += '</div>';
  html += '<div id="wrongBody"></div>';
  mainEl.innerHTML = html;
  if(WRONGTAB==='group') drawWrongGroup();
  else drawWrongFlat(WRONGTAB);
}
function drawWrongGroup(){
  const body = document.getElementById('wrongBody');
  const today = todayStr();
  let html='';
  DATA.forEach(t=>{
    let wrongN=0, total=t.items.length;
    t.items.forEach((_,i)=>{
      const rec = getItem(keyOf(t.id,i));
      if(rec && !rec.flagged && confDisplayOf(rec, today) < 0) wrongN++;
    });
    if(wrongN===0) return;
    const tg = topicGauge(t);
    html += '<div class="topic-card" data-action="wronggroup" data-id="'+escapeHtml(t.id)+'">';
    html += '<div class="row"><div><div class="ttl">'+escapeHtml(t.title)+'</div>';
    html += '<div class="meta">'+total+'개 판례 · '+boltIcon(confColor(tg.raw))+' '+tg.pct+'</div></div>';
    html += '<span class="chev">›</span></div>';
    html += '<div class="progress-bar"><div style="width:'+tg.pct+'%;background:'+confColor(tg.raw)+';"></div></div>';
    html += '</div>';
  });
  body.innerHTML = html || '<div class="empty">복습이 필요한 쟁점이 없습니다.</div>';
}
function drawWrongFlat(sortMode){
  const body = document.getElementById('wrongBody');
  const today = todayStr();
  let rows = [];
  DATA.forEach(t=>{
    t.items.forEach((it,i)=>{
      const k = keyOf(t.id,i);
      const rec = getItem(k);
      if(!rec || rec.flagged) return;
      if(confDisplayOf(rec, today) >= 0) return;
      rows.push({t, it, i, k, rec});
    });
  });
  if(sortMode==='recent'){
    rows.sort((a,b)=> (b.rec.lastSeenTs||0) - (a.rec.lastSeenTs||0));
  } else {
    rows.sort((a,b)=> confDisplayOf(a.rec, today) - confDisplayOf(b.rec, today));
  }
  let html='';
  rows.forEach(r=>{
    const color = confColor(confDisplayOf(r.rec, today));
    const date = r.rec.lastSeenDate ? fmtDate(r.rec.lastSeenDate) : '';
    html += '<div class="list-row" data-action="row" data-topic="'+escapeHtml(r.t.id)+'" data-idx="'+r.i+'"><div class="left"><span class="dot" style="background:'+color+'"></span><p class="txt">'+escapeHtml(r.it.prompt)+'</p></div><span class="date">'+date+'</span></div>';
  });
  body.innerHTML = html || '<div class="empty">해당 항목이 없습니다.</div>';
}
// ---------- FLAGGED LIST ----------
function renderFlagged(){
  topTitle.textContent = '신고된 문항';
  const route = {topicId:null, filter:'flagged', sort:'order', q:''};
  let html = '<div id="listBody" style="padding-right:18px;"></div>';
  mainEl.innerHTML = html;
  const body = document.getElementById('listBody');
  const rows = collectListItems(route);
  if(rows.length===0){ body.innerHTML = '<div class="empty">신고된 문항이 없습니다.</div>'; return; }
  let out='';
  rows.forEach(r=>{
    const note = r.rec.flagNote ? ' — '+escapeHtml(r.rec.flagNote) : '';
    out += '<div class="list-row" data-action="flagrow" data-topic="'+escapeHtml(r.t.id)+'" data-idx="'+r.i+'"><div class="left"><span class="dot red"></span><p class="txt">'+escapeHtml(r.it.prompt)+note+'</p></div></div>';
  });
  body.innerHTML = out;
}

// ---------- SETTINGS ----------
function renderSettings(){
  topTitle.textContent = '설정';
  const flaggedN = Object.keys(STATE.items).filter(k=>STATE.items[k].flagged).length;
  let html = '';
  html += '<div class="setting-row" data-action="flagged"><span class="lbl">신고된 문항 ('+flaggedN+')</span></div>';
  html += '<div class="setting-row" data-action="export" style="margin-top:16px;"><span class="lbl">데이터 내보내기</span></div>';
  html += '<div class="setting-row" data-action="import"><span class="lbl">데이터 가져오기</span></div>';
  html += '<div class="setting-row danger" data-action="hardreset" style="margin-top:16px;"><span class="lbl">전체 진도 초기화</span></div>';
  mainEl.innerHTML = html;
}
async function exportData(){
  const filename = 'panrye_backup_' + todayStr() + '_' + timeStr() + '.json';
  const jsonStr = JSON.stringify(STATE, null, 2);
  // 1순위: 네이티브 공유시트(파일 공유) — 리들 등 HTML 뷰어의 "외부 링크 차단" 제약을 우회
  if(navigator.canShare && navigator.share){
    try{
      const file = new File([jsonStr], filename, {type:'application/json'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file]});
        return true;
      }
    }catch(e){
      if(e && e.name==='AbortError') return false; // 사용자가 공유시트에서 취소함
      // 그 외 오류는 아래 블롭 다운로드로 폴백
    }
  }
  // 2순위: 기존 블롭 다운로드 방식
  try{
    const blob = new Blob([jsonStr], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
    return true;
  }catch(e){
    return false;
  }
}
document.getElementById('importFile').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const parsed = JSON.parse(ev.target.result);
      if(!parsed || typeof parsed!=='object' || !parsed.items) throw new Error('bad format');
      STATE = parsed;
      persist();
      showConfirm('가져오기 완료', '진도 데이터를 불러왔습니다.', function(){ go({view:'home'}); }, false);
    }catch(err){
      showConfirm('가져오기 실패', '올바른 백업 파일이 아닙니다.', function(){}, false);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});
function hardReset(){
  showConfirm('전체 진도 초기화', '백업 파일을 먼저 저장한 뒤 초기화됩니다.', function(){
    exportData().then(function(ok){
      if(!ok){
        showConfirm('백업 실패', '백업 파일 저장에 실패해 초기화를 중단했습니다.', function(){}, false);
        return;
      }
      setTimeout(()=>{
        STATE = {items:{}};
        persist();
        go({view:'home'});
      }, 400);
    });
  });
}

render();
