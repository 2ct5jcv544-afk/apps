<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상세/채점페이지 비교 — B안 — 밑줄</title>
<style>
  :root {
    --bg:#000; --card:#1c1c1e; --card2:#2c2c2e; --text:#eee; --sub:#8a8a8a;
    --green:#4caf50; --blue:#5b9bd5; --border:#3a3a3a; --gold:#e0b84a; --silver:#e4e4ea;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,"Apple SD Gothic Neo",sans-serif; max-width:480px; margin:0 auto; padding-bottom:40px; }
  .variant-title { font-size:16px; font-weight:600; padding:20px 20px 4px; }
  .variant-sub { font-size:12px; color:var(--sub); padding:0 20px 8px; }
  .section-label { font-size:12px; color:var(--sub); text-transform:uppercase; letter-spacing:.05em; margin:22px 20px 8px; }
  .panel { margin:0 20px 8px; background:var(--card); border-radius:16px; padding:18px 20px; }
  .meta-line { font-size:13px; color:var(--sub); margin-bottom:12px; display:flex; align-items:center; gap:4px; }
  .meta-line .bolt { width:12px; height:12px; }
  .detail-text { font-size:14.5px; line-height:1.9; }
  .kw-heading { margin:12px 0 4px; font-weight:600; }
  .kw-heading:first-child { margin-top:0; }
  .kw-heading[data-indent="1"] { margin-left:16px; font-weight:500; font-size:14px; }
  .kw-line { margin:4px 0; }
  .kw-line[data-indent="1"] { margin-left:16px; }
  .blankmark { text-decoration:underline; text-underline-offset:2px; }
  .blankmark.g { color:var(--green); }
  .blankmark.b { color:var(--blue); }
  .outline-row { margin:9px 0; display:flex; gap:8px; }
  .outline-row .lvl { color:var(--sub); font-size:13px; min-width:2.4em; flex-shrink:0; }
  .outline-row[data-indent="1"] { margin-left:18px; }
  .outline-row[data-indent="2"] { margin-left:36px; }
</style>
</head>
<body>

<div class="variant-title">B안 — 밑줄</div>
<div class="variant-sub">상세페이지 = 빈칸을 B안 — 밑줄 스타일로 표시(평가색 없음) · 채점페이지 = 같은 구조 + 정답/오답 색(초록=정답, 파랑=오답)</div>

<div class="section-label">상세페이지 — 목차</div>
<div class="panel" id="detailOutline"></div>

<div class="section-label">상세페이지 — 키워드</div>
<div class="panel" id="detailKeyword"></div>

<div class="section-label">채점페이지 — 목차 (B방식)</div>
<div class="panel" id="scoreOutline"></div>

<div class="section-label">채점페이지 — 키워드 (B방식)</div>
<div class="panel" id="scoreKeyword"></div>

<script>
const OUTLINE = [{"lvl":"I","answer":"개념","indent":0},{"lvl":"1","answer":"일반적 개념","indent":1},{"lvl":"2","answer":"정부가 사회의 공공가치를 실현하기 위한 활동","indent":1},{"lvl":"II","answer":"행정에 대한 접근방법 (Rosenbloom, Wright)","indent":0},{"lvl":"1","answer":"정치적 관점","indent":1},{"lvl":"2","answer":"관리적(경영적) 관점","indent":1},{"lvl":"3","answer":"법적 관점","indent":1},{"lvl":"(1)","answer":"의의","indent":2},{"lvl":"(2)","answer":"법적 관점과 관리적 관점의 충돌과 해소방안","indent":2}];
const KEYWORD_LINES = [{"type":"heading","indent":0,"text":"II. 행정에 대한 접근방법 : Rosenbloom, Wright 중심으로"},{"type":"heading","indent":1,"text":"1. 정치적 관점(political perspective)"},{"type":"content","indent":1,"text":"① 정치는 '{{b}}'으로 정의됨({{b}})","blanks":["사회를 위한 가치의 권위적 배분","D. Easton"]},{"type":"content","indent":1,"text":"② 정치행정{{b}}론 패러다임에 입각","blanks":["일원"]},{"type":"content","indent":1,"text":"③ 행정은 {{b}} 실현을 주요 목적으로 하며 {{b}}을 가장 중요한 가치로 고려한다.","blanks":["공공가치","민주성"]},{"type":"content","indent":1,"text":"④ 행정은 다양한 {{b}}의 요구사항을 {{b}}하고자 한다.","blanks":["이해관계자들","조정·중재"]},{"type":"content","indent":1,"text":"⑤ 행정은 시민들의 {{b}}를 기반으로 한다({{b}} 실현, {{b}}을 달성).","blanks":["참여","참여적 민주주의","집합적 자기결정"]},{"type":"heading","indent":1,"text":"2. 관리적(경영적) 관점(managerial perspective)"},{"type":"content","indent":1,"text":"① 행정은 국가의 인적·물적·제도적 {{b}}라는 경영적 측면 강조","blanks":["자원 관리"]},{"type":"content","indent":1,"text":"② 정치행정{{b}}론 패러다임","blanks":["이원"]},{"type":"content","indent":1,"text":"③ {{b}}을 포함한 행정관리학자들은 행정을 정치와 분리된 {{b}}으로 간주하며, 행정의 {{b}}을 강조함.","blanks":["윌슨","독자적인 영역","관리기능"]},{"type":"content","indent":1,"text":"④ 보다 과학적이고 합리적인 정책결정 및 집행을 위한 다양한 {{b}} 사용(예: {{b}})","blanks":["관리기법","예비타당성조사 시 비용-편익분석, AHP 기법 활용"]}];

// 데모용 정오 패턴(실제로는 사용자가 입력한 답과 채점 결과로 대체됨) — 초록/파랑 둘 다 보이게 3개 중 1개꼴로 오답 표시
function mockCorrect(i){ return (i % 3 !== 0); }

function renderDetailOutline(){
  const el = document.getElementById("detailOutline");
  el.innerHTML = OUTLINE.map(row =>
    `<div class="outline-row" data-indent="${row.indent}"><span class="lvl">${row.lvl}.</span><span class="blankmark">${row.answer}</span></div>`
  ).join("");
}

function renderScoreOutline(){
  const el = document.getElementById("scoreOutline");
  el.innerHTML = OUTLINE.map((row, i) => {
    const cls = mockCorrect(i) ? "g" : "b";
    return `<div class="outline-row" data-indent="${row.indent}"><span class="lvl">${row.lvl}.</span><span class="blankmark ${cls}">${row.answer}</span></div>`;
  }).join("");
}

function renderKeywordPassage(targetId, colored){
  const el = document.getElementById(targetId);
  let blankCounter = 0;
  el.innerHTML = KEYWORD_LINES.map(row => {
    if (row.type === "heading") {
      return `<div class="kw-heading" data-indent="${row.indent}">${row.text}</div>`;
    }
    let bIdx = 0;
    const text = row.text.replace(/\{\{b\}\}/g, () => {
      const ans = row.blanks[bIdx]; bIdx++;
      const i = blankCounter++;
      const cls = colored ? (mockCorrect(i) ? "blankmark g" : "blankmark b") : "blankmark";
      return `<span class="${cls}">${ans}</span>`;
    });
    return `<div class="kw-line detail-text" data-indent="${row.indent}">${text}</div>`;
  }).join("");
}

renderDetailOutline();
renderScoreOutline();
renderKeywordPassage("detailKeyword", false);
renderKeywordPassage("scoreKeyword", true);
</script>
</body>
</html>
